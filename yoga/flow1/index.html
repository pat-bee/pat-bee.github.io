<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yoga Sequence – Pose / Cue / Image</title>
  <style>
    /* Sun-up / Sun-down via prefers-color-scheme */
    :root{
      /* Day (light) defaults */
      --bg:#f7f8fb;
      --card:#ffffff;
      --ink:#111318;
      --muted:#4b5563;
      --line:rgba(17,19,24,.14);
      --chip:rgba(17,19,24,.05);
      --shadow: 0 10px 30px rgba(17,19,24,.10);

      --radius:18px;
      --pad:16px;
      --max:1180px;

      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --fs: 20px;          /* big base font */
      --fs-small: 14px;
    }

    @media (prefers-color-scheme: dark){
      :root{
        /* Night (dark) */
        --bg:#0b0c10;
        --card:#111521;
        --ink:#eef2ff;
        --muted:#aab3d6;
        --line:rgba(255,255,255,.12);
        --chip:rgba(255,255,255,.06);
        --shadow: 0 14px 34px rgba(0,0,0,.45);
      }
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:var(--sans);
      font-size:var(--fs);
      line-height:1.35;
    }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:20px;
    }

    header{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:16px;
    }

    h1{
      font-size:1.1em;
      margin:0;
      letter-spacing:.2px;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:0.85em;
    }

    .grid{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .row{
      display:grid;
      grid-template-columns: 1.1fr 2fr 1fr;
      gap:12px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:var(--pad);
      box-shadow:var(--shadow);
      align-items:stretch;
    }

    .cell{
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      background: var(--chip);
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:92px;
    }

    .label{
      font-size:var(--fs-small);
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    .pose{
      font-weight:750;
      font-size:1.5em; /* requested */
      line-height:1.15;
    }

    .cue{
      font-size:1em;
      white-space:pre-wrap;
      opacity:.98;
    }

    .imgbox{
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
    }

    .imgbox img{
      width:100%;
      height:auto;
      max-height:190px;
      object-fit:contain;
      border-radius:12px;
      display:block;
      border:1px dashed rgba(127,127,127,.35);
      background: rgba(0,0,0,.06);
    }

    .fname{
      margin-top:10px;
      font-family:var(--mono);
      font-size:var(--fs-small);
      color:var(--muted);
      user-select:all;
      word-break:break-word;
    }

    /* Mobile: stack Pose, Cue, Image */
    @media (max-width: 860px){
      body{ font-size: 22px; } /* slightly larger on mobile */
      .row{ grid-template-columns: 1fr; }
      .imgbox img{ max-height:260px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Yoga Sequence Spreadsheet (HTMLxy)</h1>
      <p class="sub">
        Rows render from your CSV. Each row: <strong>Pose Name</strong> • <strong>Cue</strong> • <strong>Image</strong>.
        Image file names are auto-generated (Right assumed; Left gets <code>_L</code>).
      </p>
    </header>

    <main id="grid" class="grid"></main>
  </div>

  <script>
    // ---- Source data (from your FULL CSV) ----
    const rows = [
      { pose: "Seated Meditation (Easy Pose)", cue: "Focus on energy projection; palms down for grounding or up for receiving." },
      { pose: "Seated Side Bend", cue: "Arms overhead, lateral stretches to both sides." },
      { pose: "Downward-Facing Dog", cue: "" },
      { pose: "Forward Fold / Ragdoll", cue: "" },
      { pose: "Slow Roll-Up to Standing", cue: "" },
      { pose: "Mountain Pose (Tadasana)", cue: "" },
      { pose: "Standing Side Bend", cue: "Reach overhead, lean Right, center, lean Left, center (3 reps)." },
      { pose: "Hands to Prayer", cue: "" },
      { pose: "Mountain to Forward Fold", cue: "Inhale reach high look to your thumbs; exhale hinge from the hips heart leads the way down to a forward fold." },
      { pose: "Flat Back", cue: "Inhale to a flat back." },
      { pose: "Plank", cue: "Plant the palms step back to plank shift forward onto the toes." },
      { pose: "Low Push-Up (Chaturanga)", cue: "Exhale lower halfway elbows hugging ribs." },
      { pose: "Upward-Facing Dog", cue: "Inhale roll over the toes lift the chest shoulders away from ears knees off mat." },
      { pose: "Downward-Facing Dog", cue: "Exhale lift hips high." },

      { pose: "Warrior II (Right)", cue: "Step right foot forward spin back heel down windmill arms open sink into right knee gaze over right middle finger." },
      { pose: "Triangle (Right)", cue: "Straighten right leg reach forward right hand to shin or block left arm to sky body between two panes of glass." },
      { pose: "Reverse Warrior (Right)", cue: "Sweep right arm up and back left hand rests on back thigh breathe into right side ribs." },
      { pose: "Half Moon (Right)", cue: "Right hand 10 inches forward lift left leg parallel flex left foot stack hips." },
      { pose: "Revolved Half Moon (Right)", cue: "Square hips drop left hand reach right arm up twist from mid back." },
      { pose: "Warrior III (Right)", cue: "Hands to heart lean torso forward body forms capital T left toes down core engaged." },
      { pose: "Crescent Lunge (Right)", cue: "Back foot on ball reach arms up tuck tailbone stretch left hip flexor." },
      { pose: "Side Plank (Right)", cue: "Roll onto outer right foot stack left foot lift right hip reach left arm up." },
      { pose: "Lizard (Right)", cue: "Right foot outside right hand drop back knee lower to elbows or palms breathe into inner right groin." },

      { pose: "Gate Pose (Right)", cue: "Rise up from knees extend right leg to side." },
      { pose: "Gate Pose (Left)", cue: "Rise up from knees extend left leg to side." },
      { pose: "Camel Pose", cue: "Hands to heels lift chest arch back." },
      { pose: "Sphinx or Cobra", cue: "Forearms or hands down lift chest gentle backbend." },
      { pose: "Tabletop / Box Pose", cue: "Neutral spine on hands and knees." },
      { pose: "Thread the Needle (Right)", cue: "Right arm threads under chest shoulder to mat." },
      { pose: "Thread the Needle (Left)", cue: "Left arm threads under chest shoulder to mat." },
      { pose: "Extended Puppy Pose", cue: "Hips above knees arms forward chest melts toward mat." },
      { pose: "Child's Pose", cue: "Hips to heels forehead down relax." },

      { pose: "Mountain to Forward Fold (Left Sequence)", cue: "Inhale reach high exhale fold from hips." },
      { pose: "Flat Back (Left Sequence)", cue: "Inhale lengthen spine." },
      { pose: "Plank (Left Sequence)", cue: "Step back to plank." },
      { pose: "Low Push-Up / Chaturanga (Left Sequence)", cue: "Lower halfway elbows hug ribs." },
      { pose: "Upward-Facing Dog (Left Sequence)", cue: "Lift chest roll over toes." },
      { pose: "Downward-Facing Dog (Left Sequence)", cue: "Lift hips high." },

      { pose: "Warrior II (Left)", cue: "Step left foot forward spin back heel down windmill arms open sink into left knee gaze over left middle finger." },
      { pose: "Triangle (Left)", cue: "Straighten left leg reach forward left hand to shin or block right arm to sky." },
      { pose: "Reverse Warrior (Left)", cue: "Sweep left arm up and back right hand rests on back thigh breathe into left side ribs." },
      { pose: "Half Moon (Left)", cue: "Left hand forward lift right leg parallel flex right foot stack hips." },
      { pose: "Revolved Half Moon (Left)", cue: "Square hips drop right hand reach left arm up twist mid back." },
      { pose: "Warrior III (Left)", cue: "Hands to heart lean torso forward body forms capital T right toes down." },
      { pose: "Crescent Lunge (Left)", cue: "Back foot on ball reach arms up stretch right hip flexor." },
      { pose: "Side Plank (Left)", cue: "Roll onto outer left foot stack right foot lift left hip reach left arm up." },
      { pose: "Lizard (Left)", cue: "Left foot outside left hand drop back knee breathe into inner left groin." },

      { pose: "Goddess Pose", cue: "Wide squat toes turned out arms bent cactus shape." },
      { pose: "Garland Pose / Yogi Squat", cue: "Deep squat palms together elbows press knees open." },
      { pose: "Crow Pose (Optional)", cue: "Hands down knees to triceps lean forward lift feet." },
      { pose: "Supported Shoulder Stand or Headstand", cue: "Practice inversion with props or wall." },
      { pose: "Seated Transition", cue: "Come to seated slowly with control." },
      { pose: "Bridge Pose (Supported with Block)", cue: "Lift hips place block under sacrum." },
      { pose: "One-Legged Bridge (Right)", cue: "Extend right leg while hips lifted." },
      { pose: "One-Legged Bridge (Left)", cue: "Extend left leg while hips lifted." },
      { pose: "Slow Roll Down", cue: "Remove block articulate spine to mat." },
      { pose: "Reclining Bound Angle", cue: "Feet together knees open hands on belly." },
      { pose: "Corpse Pose / Savasana", cue: "Full relaxation natural breath." },
      { pose: "Fetal Position", cue: "Roll to one side knees drawn in." },
      { pose: "Return to Easy Pose", cue: "Sit tall bring palms together for closing namaste." }
    ];

    // ---- Filename rules ----
    // Right is assumed; Left indicated with _L.
    // Examples requested: Warrior2.png, LowPushUp.png, Lizard_L.png
    const ROMAN = new Map([
      ["I", "1"], ["II", "2"], ["III", "3"], ["IV", "4"], ["V", "5"], ["VI", "6"], ["VII", "7"], ["VIII", "8"], ["IX", "9"], ["X", "10"]
    ]);

    function isLeftPose(poseName){
      // Any explicit Left marker OR left-side sequence is treated as left for filename
      return /\(Left\)/i.test(poseName) || /\(Left Sequence\)/i.test(poseName);
    }

    function stripSideMarkers(poseName){
      return poseName
        .replace(/\s*\(Right\)\s*/gi, "")
        .replace(/\s*\(Left\)\s*/gi, "")
        .replace(/\s*\(Left Sequence\)\s*/gi, "")
        .replace(/\s*\(Optional\)\s*/gi, "")
        .trim();
    }

    function romanToDigitsInWords(s){
      // Replace standalone roman numerals as tokens (e.g., "Warrior II" -> "Warrior 2")
      return s.split(/\s+/).map(tok => ROMAN.get(tok) ?? tok).join(" ");
    }

    function toPascalCaseFilenameBase(poseName){
      // 1) strip side markers and optional markers
      let base = stripSideMarkers(poseName);

      // 2) convert roman numerals to digits
      base = romanToDigitsInWords(base);

      // 3) remove parenthetical subtitles, but keep meaningful words inside common ones already handled
      // (e.g., "Mountain Pose (Tadasana)" -> "Mountain Pose")
      base = base.replace(/\s*\([^)]*\)\s*/g, " ").trim();

      // 4) normalize separators: hyphens, slashes, apostrophes -> spaces
      base = base
        .replace(/[\/]/g, " ")
        .replace(/[-–—]/g, " ")
        .replace(/[’']/g, "");

      // 5) remove other punctuation
      base = base.replace(/[^a-zA-Z0-9\s]/g, " ");

      // 6) collapse spaces
      base = base.replace(/\s+/g, " ").trim();

      // 7) PascalCase join, but keep digits as-is (Warrior 2 -> Warrior2)
      const parts = base.split(" ").filter(Boolean);
      return parts.map(p => {
        // if token is all digits, keep it
        if (/^\d+$/.test(p)) return p;
        return p.charAt(0).toUpperCase() + p.slice(1);
      }).join("");
    }

    function imageFilename(poseName){
      const left = isLeftPose(poseName);
      const base = toPascalCaseFilenameBase(poseName);
      return left ? `${base}_L.png` : `${base}.png`;
    }

    // ---- Render ----
    const grid = document.getElementById("grid");

    rows.forEach((r) => {
      const fname = imageFilename(r.pose);

      const row = document.createElement("section");
      row.className = "row";

      row.innerHTML = `
        <div class="cell">
          <div class="label">Pose Name</div>
          <div class="pose">${escapeHtml(r.pose)}</div>
        </div>

        <div class="cell">
          <div class="label">Cue</div>
          <div class="cue">${escapeHtml(r.cue || "")}</div>
        </div>

        <div class="cell imgbox">
          <div class="label">Image</div>
          <img src="${escapeAttr(fname)}" alt="${escapeAttr(r.pose)} image (${fname})">
          <div class="fname">${escapeHtml(fname)}</div>
        </div>
      `;

      grid.appendChild(row);
    });

    // ---- small helpers ----
    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(str){ return escapeHtml(str); }
  </script>
</body>
</html>
