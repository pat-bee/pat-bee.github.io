  <!--
    BREAKBREAK: font imports → partials/head.html

  <!-- BREAKBREAK: this entire <style> block → styles/opstylo.css -->
  <style>
    /*
    ══════════════════════════════════════════════════════════════
    OPSTYLO — Industrial / NASA Mission Systems design system
    ──────────────────────────────────────────────────────────────
    Palette drawn from operational aerospace gear: weathered metal,
    safety-orange markings, instrument-panel surfaces, copper patina.

    RULE: functional over ornamental. Structural borders signal
    system divisions. Safety orange commands action. Grey grounds
    everything. The dot-grid body recalls engineering spec paper.

    PALETTE:
      #B4BEBB  Industrial grey. Page ground.
      #BECBC6  Panel surface. Slightly elevated.
      #CDD8D3  Raised face. Instrument surface.
      #A8B3AE  Inset. Recessed pocket.
      #3A413C  Shadow charcoal. Structural lines.

      #FF7300  Safety orange. Dominant. Play button.
      #A0B0B8  Steel blue-grey. Secondary. Active states.
      #C68767  Weathered copper/bronze. Tertiary. Remix row.

    TYPOGRAPHY:
      Barlow Condensed 700 — all display/title text.
                              Stenciled, mission-spec, utilitarian.
      Courier Prime          — all UI chrome.
    ══════════════════════════════════════════════════════════════
    */
    :root {
      /* Industrial grey ground */
      --canvas:        #B4BEBB;
      --bg:            #B4BEBB;
      --bg-panel:      #BECBC6;
      --bg-raised:     #CDD8D3;
      --bg-inset:      #A8B3AE;

      /* Shadow charcoal — structural ink */
      --grid:          #3A413C;
      --grid-mid:      #566059;
      --grid-dim:      #8A9690;
      --ink:           #3A413C;
      --ink-mid:       #566059;
      --ink-dim:       #8A9690;
      --ink-ghost:     rgba(58,65,60,0.06);

      /* Safety orange — play button, errors, focus */
      --red:           #FF7300;
      --red-bright:    #FF8C1F;
      --red-dim:       #CC5A00;
      --red-faint:     rgba(255,115,0,0.09);
      --red-pale:      rgba(255,115,0,0.15);
      --red-border:    rgba(255,115,0,0.40);
      --red-text:      #1C1F1D;

      /* Steel blue-grey — active indicator, seek thumb */
      --blue:          #A0B0B8;
      --blue-bright:   #B4C4CC;
      --blue-dim:      #607880;
      --blue-faint:    rgba(160,176,184,0.15);
      --blue-border:   rgba(160,176,184,0.45);

      /* Weathered copper/bronze — remix row, repeat-song */
      --green:         #C68767;
      --green-bright:  #D49770;
      --green-dim:     #8A5E44;
      --green-faint:   rgba(198,135,103,0.12);
      --green-border:  rgba(198,135,103,0.38);

      /* Borders — structural weight */
      --border:        rgba(58,65,60,0.18);
      --border-mid:    rgba(58,65,60,0.32);
      --border-strong: rgba(58,65,60,0.65);

      --focus-ring:    #FF7300;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .skip-link {
      position: absolute; top: -100%; left: 12px; z-index: 99999;
      background: var(--red); color: var(--red-text);
      padding: 8px 18px; font-family: 'Courier Prime', monospace;
      font-size: 0.8rem; letter-spacing: 0.06em;
      text-decoration: none; transition: top 200ms;
    }
    .skip-link:focus { top: 0; }
    :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 3px; }

    html {
      background-color: var(--canvas);
      background: var(--bg);
      color: var(--ink);
      font-family: 'Courier Prime', 'Courier New', monospace;
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    /* Body: industrial grey — fine dot grid references engineering spec paper.
       The pattern recalls NASA technical drawing paper and instrument backing.
       Subtle but purposeful: this page has been used, marked up, referenced. */
    body {
      min-height: 100vh;
      background-color: var(--canvas);
      background:
        radial-gradient(circle, rgba(58,65,60,0.13) 1px, transparent 1px),
        var(--canvas);
      background-size: 20px 20px;
      position: relative; overflow-x: hidden;
    }

    button { font-family: 'Courier Prime', monospace; color: inherit; cursor: pointer; }

    .page-shell {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px 64px;
    }
    .inner { width: 100%; max-width: 880px; }

    /* ── MASTHEAD ─────────────────────────────────────────────────────────
       Instrument-panel surface. Safety-orange left stripe = action indicator.
       Steel blue-grey right strip = secondary system register.
       Raised surface sits above the dot-grid ground.
       BREAKBREAK: partials/masthead.html
    ──────────────────────────────────────────────────────────────────────── */
    .masthead {
      position: relative;
      padding: 22px 28px 18px 32px;
      background: var(--bg-raised);
      border: 2px solid var(--grid);
      border-bottom: 3px solid var(--grid);
      /* Safety orange left stripe — the dominant action color */
      border-left: 6px solid var(--red);
      overflow: hidden;
    }

    /* Steel blue-grey right instrument strip */
    .masthead::after {
      content: "";
      position: absolute; top: 0; right: 0;
      width: 12px; height: 100%;
      background: var(--blue);
      opacity: 0.5;
      pointer-events: none;
    }

    .masthead-eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 0.52rem; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--ink-dim); margin-bottom: 8px;
    }
    /* Links inside the eyebrow */
    .masthead-eyebrow a {
      color: var(--ink-dim); text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 160ms, border-color 160ms;
    }
    .masthead-eyebrow a:hover { color: var(--red); border-bottom-color: var(--red-border); }

    /* container-type — cqi measures this column for fluid title scaling */
    .masthead-titles { min-width: 0; overflow: hidden; container-type: inline-size; }

    /*
    Barlow Condensed 700 — the display font.
    Uppercase, mission-spec weight. Reads like stenciled labeling on
    aerospace equipment panels: dense, confident, load-bearing.
    The condensed form packs maximum signal into minimum width —
    fitting for a page built for function over display.
    */
    .masthead-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-style: normal;
      font-size: clamp(2.2rem, 12cqi, 6rem);
      white-space: nowrap; overflow: hidden; text-overflow: clip;
      line-height: 1.1;
      padding-bottom: 0.06em;
      color: var(--ink);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .masthead-sub {
      margin-top: 8px; font-family: 'Courier Prime', monospace;
      font-size: 0.55rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--ink-dim);
    }

    /* ── MAIN GRID ──────────────────────────────────────────────────────── */
    .main-grid {
      display: grid; grid-template-columns: minmax(210px, 340px) 1fr;
      border: 2px solid var(--grid); border-top: none;
      background: var(--bg-panel);
    }

    /* col-art: no padding — art fills 100% of column.
       The 2px right border IS a structural line.
       BREAKBREAK: img src set from SONG_CONFIG.artworkUrl in init()         */
    .col-art { border-right: 2px solid var(--grid); }
    .col-player { padding: 22px; display: flex; flex-direction: column; gap: 14px; min-width: 0; }

    /* ── ALBUM ART ───────────────────────────────────────────────────────────
       No filter treatment — art shown clean.
       Playing state: steel blue-grey and copper inset glow.
    ──────────────────────────────────────────────────────────────────────── */
    .art-wrap {
      position: relative; width: 100%; aspect-ratio: 1 / 1;
      overflow: hidden; background: var(--bg-inset);
      display: block;
      transition: box-shadow 600ms;
    }
    .art-wrap.is-playing {
      box-shadow: inset -4px 0 0 var(--blue), inset 0 -4px 0 var(--green);
    }
    .art-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block; position: relative; z-index: 2;
      transition: opacity 180ms ease;
    }

    /* EQ bars — safety orange, steel blue-grey, weathered copper cycling */
    .eq-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; height: 18%;
      display: flex; align-items: flex-end; gap: 2px; padding: 0 12%;
      opacity: 0; transition: opacity 600ms; z-index: 5;
    }
    .art-wrap.is-playing .eq-overlay { opacity: 1; }
    .eq-b { flex: 1; min-height: 2px; animation: vu-bar 0.65s ease infinite alternate; }
    .eq-b:nth-child(1){background:var(--red);   animation-delay:0.00s}
    .eq-b:nth-child(2){background:var(--blue);  animation-delay:0.09s}
    .eq-b:nth-child(3){background:var(--red);   animation-delay:0.18s}
    .eq-b:nth-child(4){background:var(--green); animation-delay:0.05s}
    .eq-b:nth-child(5){background:var(--blue);  animation-delay:0.14s}
    .eq-b:nth-child(6){background:var(--red);   animation-delay:0.23s}
    .eq-b:nth-child(7){background:var(--green); animation-delay:0.07s}
    .eq-b:nth-child(8){background:var(--blue);  animation-delay:0.16s}
    @keyframes vu-bar { from { height: 3%; } to { height: 72%; } }

    /* ── NOW PLAYING ────────────────────────────────────────────────────── */
    .np-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.5rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--ink-dim); margin-bottom: 4px;
    }
    .np-title {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 1.45rem; line-height: 1.1;
      color: var(--ink); word-break: break-word;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .np-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }

    /* Steel blue-grey indicator dot */
    .live-dot {
      display: inline-block; width: 8px; height: 8px;
      background: var(--ink-ghost); border: 1px solid var(--border);
      flex-shrink: 0; transition: all 200ms;
    }
    .live-dot.active {
      background: var(--blue); border-color: var(--blue-dim);
      box-shadow: 0 0 0 2px var(--blue-faint);
      animation: ops-pulse 1.4s ease-in-out infinite;
    }
    @keyframes ops-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Format indicator dot — square, no border-radius (structural, system-language). */
    .fmt-dot {
      display: inline-block; width: 8px; height: 8px;
      background: var(--ink-ghost); border: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 300ms, border-color 300ms, box-shadow 300ms;
    }
    .fmt-dot.is-lossless {
      background: var(--green);
      border-color: var(--green-dim);
      box-shadow: 0 0 0 2px var(--green-faint);
    }
    .fmt-dot.is-lossy {
      background: #B8860B;
      border-color: #7A5A06;
      box-shadow: 0 0 0 2px rgba(184,134,11,0.15);
    }

    .badge {
      font-family: 'Courier Prime', monospace;
      font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 2px 7px; border: 1px solid var(--border); color: var(--ink-mid);
    }
    .badge-flac  { border-color: var(--blue-border); color: var(--blue-dim); }
    .badge-wake.active { border-color: var(--border-mid); color: var(--ink-mid); }

    /* Buffer bar */
    .buf-wrap { width: 100%; height: 2px; background: var(--ink-ghost); }
    .buf-fill { height: 100%; background: var(--grid-dim); width: 0%; transition: width 400ms; }
    .buf-fill.loading { animation: buf-flicker 1.1s ease-in-out infinite; }
    @keyframes buf-flicker { 0%,100%{opacity:0.2} 50%{opacity:0.9} }

    /* Seek bar */
    .prog-row {
      display: grid; grid-template-columns: 46px 1fr 46px;
      gap: 8px; align-items: center;
      font-family: 'Courier Prime', monospace; font-size: 0.64rem;
      color: var(--ink-mid); font-variant-numeric: tabular-nums;
    }
    .prog-bar {
      appearance: none; width: 100%; height: 6px;
      background: var(--blue-faint);
      border: 1px solid var(--border); border-radius: 0; cursor: pointer;
    }
    /* Steel blue-grey seek thumb */
    .prog-bar::-webkit-slider-thumb {
      appearance: none; width: 10px; height: 22px;
      background: var(--blue); border: 2px solid var(--grid); border-radius: 0; cursor: pointer;
    }
    .prog-bar::-moz-range-thumb {
      width: 10px; height: 22px;
      background: var(--blue); border: 2px solid var(--grid); border-radius: 0; cursor: pointer;
    }

    /* Volume */
    .vol-row { display: flex; align-items: center; gap: 10px; }
    .vol-label {
      font-family: 'Courier Prime', monospace; font-size: 0.5rem;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); min-width: 44px;
    }
    .vol-bar {
      appearance: none; flex: 1; height: 5px;
      background: var(--blue-faint); border: 1px solid var(--border);
      border-radius: 0; cursor: pointer;
    }
    .vol-bar::-webkit-slider-thumb {
      appearance: none; width: 9px; height: 18px;
      background: var(--ink-mid); border-radius: 0; cursor: pointer;
    }
    .vol-bar::-moz-range-thumb {
      width: 9px; height: 18px; background: var(--ink-mid); border-radius: 0; cursor: pointer;
    }
    .vol-pct {
      font-family: 'Courier Prime', monospace; font-size: 0.58rem;
      color: var(--ink-dim); font-variant-numeric: tabular-nums; min-width: 34px; text-align: right;
    }

    /* ── CONTROLS ────────────────────────────────────────────────────────
       Play: safety orange — dominant action element.
       Secondary controls: instrument-panel chrome.
       Asymmetry is intentional: one bold action, everything else recessive.
    ──────────────────────────────────────────────────────────────────────── */
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .ctrl-btn {
      border: 1px solid var(--border-mid); background: var(--bg-raised);
      color: var(--ink-mid); font-family: 'Courier Prime', monospace;
      font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0 14px; min-height: 38px;
      transition: background 120ms, border-color 120ms, color 120ms, transform 80ms;
      position: relative; overflow: hidden;
    }
    .ctrl-btn:hover {
      background: var(--blue-faint); border-color: var(--blue-border); color: var(--ink);
    }
    .ctrl-btn:active { transform: translate(1px,1px); }

    /* ── PLAY BUTTON — safety orange, dominant action element ────────────
       State 1 (unloaded): orange fill, charcoal text, heavy shadow.
       Loading (.is-loading-text): italic, slow pulse on orange ground.
       State 2 (armed): brighter orange + outer glow — signals ready-to-fire.
       State 1 and State 2 are perceptibly different: different fill + glow.
    ──────────────────────────────────────────────────────────────────────── */
    .play-btn {
      min-width: 136px; min-height: 52px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-style: normal;
      font-size: 1.3rem; letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--red);
      color: var(--grid);           /* charcoal — maximum contrast on orange */
      border: 2px solid var(--grid);
      box-shadow: 3px 3px 0 var(--grid);
    }
    .play-btn:hover {
      background: var(--red-bright);
      box-shadow: 4px 4px 0 var(--grid);
    }
    .play-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--grid);
    }
    /* Loading state: italic weight, pulsing on orange */
    .play-btn.is-loading-text {
      font-weight: 400;
      font-style: italic;
      color: var(--grid);
      animation: loading-pulse 1.8s ease-in-out infinite;
    }
    @keyframes loading-pulse {
      0%, 100% { opacity: 0.50; }
      50%       { opacity: 1.00; }
    }
    /* State 2 — Armed: brighter orange + outer glow signals loaded + ready */
    .play-btn.is-armed {
      background: var(--red-bright);
      color: var(--grid);
      border: 2px solid var(--grid);
      box-shadow: 3px 3px 0 var(--grid), 0 0 0 3px var(--red-border);
    }
    .play-btn.is-loading { background: var(--bg-raised); border-color: var(--border-mid); cursor: wait; }
    .play-btn.is-loading::after {
      content: ""; position: absolute; top:50%; left:50%;
      width: 14px; height: 14px;
      border: 2px solid var(--red-border); border-top-color: var(--red);
      border-radius: 50%; transform: translate(-50%,-50%);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .repeat-btn { min-width: 130px; font-size: 0.62rem; }
    .repeat-btn[data-mode="song"]  { border-style: dashed; border-color: var(--green-border); color: var(--green-dim); }
    .repeat-btn[data-mode="album"] { border-style: dotted; }

    .kbd-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .kbd-hint { font-size: 0.48rem; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    kbd {
      display: inline-block; padding: 0 4px; border: 1px solid var(--border);
      font-size: 0.48rem; font-family: inherit; color: var(--ink-mid); background: var(--bg-inset);
    }
    .status-line { font-family: 'Courier Prime', monospace; font-size: 0.52rem; color: var(--ink-dim); line-height: 1.5; letter-spacing: 0.04em; }
    .err-line { font-family: 'Courier Prime', monospace; font-size: 0.6rem; color: var(--red); display: none; line-height: 1.4; border-left: 2px solid var(--red-border); padding-left: 8px; }
    .err-line.show { display: block; }

    /* ── PLAYLIST ────────────────────────────────────────────────────────
       Header: steel blue-grey left accent = secondary register.
       Active track: safety orange stripe = dominant action signal.
       BREAKBREAK: track renderer → components/track-list.js
    ──────────────────────────────────────────────────────────────────────── */
    .playlist-section {
      border: 2px solid var(--grid); border-top: none; background: var(--bg-panel);
    }
    .playlist-header {
      padding: 8px 20px; border-bottom: 1px solid var(--border-strong);
      font-family: 'Courier Prime', monospace; font-size: 0.48rem;
      letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-dim);
      display: flex; justify-content: space-between; align-items: center;
      border-left: 4px solid var(--blue);
    }
    .playlist-header::before {
      content: "Recording Log";
      font-family: 'Barlow Condensed', sans-serif; font-style: italic;
      font-size: 0.75rem; color: rgba(58,65,60,0.22); letter-spacing: 0.04em;
    }

    .track-list { list-style: none; }
    .track-btn, .remix-row {
      width: 100%; display: grid; grid-template-columns: 52px 1fr auto;
      align-items: stretch; text-align: left;
      border: none; border-bottom: 1px solid var(--border); transition: background 100ms;
    }
    .track-list li:last-child .track-btn,
    .track-list li:last-child .remix-row { border-bottom: none; }
    .track-btn { background: transparent; cursor: pointer; }
    .track-btn:hover { background: var(--blue-faint); }
    .track-btn[aria-current="true"] { background: var(--red-faint); box-shadow: inset 4px 0 0 var(--red); }
    .track-btn[aria-current="true"] .track-num { color: var(--red); }
    .track-btn[aria-current="true"].is-playing .track-num { animation: ops-pulse 1.4s ease-in-out infinite; }

    .track-num {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 0; border-right: 1px solid var(--border);
      font-family: 'Courier Prime', monospace;
      font-size: 0.88rem; letter-spacing: 0.06em; color: var(--ink-dim); min-width: 52px;
    }
    .track-info-col { padding: 13px 16px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
    .track-title-text {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 1.05rem; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .track-meta-text { font-family: 'Courier Prime', monospace; font-size: 0.48rem; color: var(--ink-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .track-dur { display: flex; align-items: center; padding: 13px 14px; font-family: 'Courier Prime', monospace; font-size: 0.64rem; color: var(--ink-dim); border-left: 1px solid var(--border); white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* ── REMIX ROW — weathered copper/bronze accent ───────────────────────
       Copper is the tertiary color — oxidised, earned, patinated.
       BREAKBREAK: components/remix-uploader.js
    ──────────────────────────────────────────────────────────────────────── */
    .remix-row { background: var(--green-faint); border-top: 1px dashed var(--green-border); cursor: pointer; position: relative; }
    .remix-row:hover { background: rgba(198,135,103,0.20); }
    .remix-row:focus-within { outline: 2px solid var(--focus-ring); outline-offset: -2px; }
    .remix-file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
    .remix-icon-cell { display: flex; align-items: center; justify-content: center; padding: 12px 0; border-right: 1px dashed var(--green-border); min-width: 52px; }
    .remix-icon-cell img { width: 24px; height: 24px; object-fit: contain; opacity: 0.5; }
    .remix-info { padding: 11px 16px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
    .remix-title { font-family: 'Barlow Condensed', sans-serif; font-style: italic; font-size: 0.95rem; color: var(--green-dim); letter-spacing: 0.04em; }
    .remix-sub { font-family: 'Courier Prime', monospace; font-size: 0.46rem; color: var(--ink-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .remix-status { display: flex; align-items: center; padding: 11px 14px; font-family: 'Courier Prime', monospace; font-size: 0.54rem; color: var(--green); border-left: 1px dashed var(--green-border); white-space: nowrap; letter-spacing: 0.1em; text-transform: uppercase; }
    .upload-toast { display: none; padding: 8px 20px; font-family: 'Courier Prime', monospace; font-size: 0.52rem; color: var(--ink-mid); letter-spacing: 0.06em; background: var(--green-faint); border-top: 1px solid var(--border); }
    .upload-toast.show { display: block; }

    /* ── SHARE STRIP ─────────────────────────────────────────────────────
       Between playlist and footer. Orange hover = action signal.
       BREAKBREAK: components/share-strip.js
    ──────────────────────────────────────────────────────────────────────── */
    .share-strip {
      display: flex; justify-content: center; align-items: center;
      gap: 20px; margin: 20px 0 10px;
    }
    .share-btn {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      background: var(--bg-raised); border: 1px solid var(--border-mid);
      color: var(--ink-mid); cursor: pointer;
      transition: border-color 140ms, color 140ms, background 140ms, box-shadow 140ms;
      padding: 0; position: relative;
    }
    .share-btn:hover {
      border-color: var(--grid); border-width: 2px; color: var(--red);
      background: var(--red-faint); box-shadow: 2px 2px 0 var(--grid);
    }
    .share-btn:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--grid); }
    .share-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .share-btn.copied { border-color: var(--green-dim); color: var(--green-dim); }
    .share-btn.copied::after {
      content: "Copied"; position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
      font-family: 'Courier Prime', monospace; font-size: 0.44rem; letter-spacing: 0.1em;
      color: var(--green-dim); white-space: nowrap; pointer-events: none;
    }
    .share-btn.hidden { display: none; }

    /* ── FOOTER ─────────────────────────────────────────────────────────── */
    .page-footer { margin-top: 10px; text-align: center; width: 100%; }
    .page-footer a {
      font-family: 'Courier Prime', monospace; font-size: 0.6rem;
      letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink-dim);
      text-decoration: none; border-bottom: 1px solid var(--border);
      padding-bottom: 2px; transition: color 160ms, border-color 160ms;
    }
    .page-footer a:hover { color: var(--red); border-color: var(--red-border); }

    /* ── MOBILE — stacked single-column layout ──────────────────────────── */
    @media (max-width: 640px) {
      .page-shell { padding: 16px 12px 48px; }
      .main-grid { grid-template-columns: 1fr; }
      .col-art { border-right: none; border-bottom: 2px solid var(--grid); }
      .col-player { padding: 16px; }
      .kbd-row { display: none; }
      .track-btn, .remix-row { grid-template-columns: 44px 1fr auto; }
      .track-num, .remix-icon-cell { min-width: 44px; }
      .playlist-header { border-left-width: 3px; }
    }

    audio { position: fixed; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

    const curTimeEl  = document.getElementById("curTime");
    const durTimeEl  = document.getElementById("durTime");
    const bufFill    = document.getElementById("bufFill");
    const volBar     = document.getElementById("volBar");   /* hidden — system volume used */
    const volPctEl   = { textContent: "" };                  /* stub — vol slider removed */
    const npTitle    = document.getElementById("npTitle");
    const fmtBadge   = document.getElementById("fmtBadge");
    const wakeBadge  = document.getElementById("wakeBadge");
    const liveDot    = document.getElementById("liveDot");
    const errLine    = document.getElementById("errLine");
    const artWrap    = document.getElementById("artWrap");
    const trackList  = document.getElementById("trackList");

    /* State */
    let currentIndex  = 0, isLoaded = false, usedFallback = false;
    let isSeeking     = false, repeatMode = "off";
    let wakeLock      = null, isRebuffering = false;

    /* Format detection */
    const flacOk = (() => { const p = document.createElement("audio"); return !!(p.canPlayType && (p.canPlayType("audio/flac") !== "" || p.canPlayType("audio/x-flac") !== "")); })();
    function getBestSrc(t, f = false) { const u = flacOk && !f; return { src: u ? t.flac : t.fallback, isFlac: u }; }
    function updateFmtBadge(f) {
      fmtBadge.textContent = f ? "FLAC" : "AAC / MP3";
      fmtBadge.className   = "badge badge-fmt" + (f ? " badge-flac" : "");
      fmtBadge.setAttribute("aria-label", "Audio format: " + (f ? "Lossless FLAC" : "AAC or MP3"));
      /* Format dot: green square = lossless, amber square = lossy */
      const dot = document.getElementById("fmtDot");
      if (dot) {
        dot.classList.toggle("is-lossless", f);
        dot.classList.toggle("is-lossy",    !f);
        dot.title = f ? "Lossless FLAC" : "Lossy AAC / MP3";
      }
    }

    /* BREAKBREAK → engine/wake-lock.js */
    async function acquireWake() { if (!("wakeLock" in navigator)) return; try { wakeLock = await navigator.wakeLock.request("screen"); setWakeBadge(true); wakeLock.addEventListener("release", () => { setWakeBadge(false); if (!audio.paused) acquireWake(); }); } catch (_) { setWakeBadge(false); } }
    async function dropWake() { if (wakeLock) { try { await wakeLock.release(); } catch (_) {} wakeLock = null; } setWakeBadge(false); }
    function setWakeBadge(on) { wakeBadge.textContent = on ? "Wake Lock On" : "Background"; wakeBadge.classList.toggle("active", on); }
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible" && !audio.paused) acquireWake(); });

    /* ════════════════════════════════════════════════════════════════════════
       BREAKBREAK → engine/audio.js — ADAPTIVE BLOB LOADER
    ════════════════════════════════════════════════════════════════════════ */
    function getConn() { const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection; return { downlink: c?.downlink ?? 10, effectiveType: c?.effectiveType ?? "4g" }; }
    function calcThr(isFlac) { const { downlink, effectiveType } = getConn(); if (effectiveType === "slow-2g" || downlink < 0.5) return null; return Math.max(0.15, Math.min(0.60, ((isFlac ? 0.9 : 0.25) / downlink) * 1.5)); }

    function upgradeToFullBlob() {
      if (!audio._fullBlobUrl) return false;
      const t = audio.currentTime, w = !audio.paused;
      if (audio._blobUrl) URL.revokeObjectURL(audio._blobUrl);
      audio._blobUrl = audio._fullBlobUrl; delete audio._fullBlobUrl;
      audio.src = audio._blobUrl; audio.preload = "auto"; audio.load();
      audio.addEventListener("loadedmetadata", function s() { audio.removeEventListener("loadedmetadata", s); audio.currentTime = t; if (w) audio.play().catch(() => {}); }, { once: true });
      return true;
    }

    async function loadAndPlayAsBlob(idx, ff = false) {
      const si = Math.max(0, Math.min(idx, album.tracks.length - 1)), tr = album.tracks[si], { src, isFlac } = getBestSrc(tr, ff);
      currentIndex = si; usedFallback = ff || !isFlac; isLoaded = true;
      npTitle.textContent = tr.title; updateFmtBadge(isFlac); clearErr(); updateTrackUI(); updateMediaSession(tr);
      const thr = calcThr(isFlac);
      if (thr === null) { loadTrack(idx, ff); try { await waitForPrebuffer(); clearDLP(); setPlayState(false); /* ready — user taps PLAY */ } catch (e) { showErr("// Check connection"); } return; }
      const ctrl = new AbortController(), tout = setTimeout(() => ctrl.abort(), BLOB_TIMEOUT_MS);
      try {
        const res = await fetch(src, { signal: ctrl.signal, cache: "default" }); clearTimeout(tout);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const total = res.headers.get("content-length") ? parseInt(res.headers.get("content-length"), 10) : null;
        const mime = isFlac ? "audio/flac" : "audio/mp4", reader = res.body.getReader(), chunks = []; let received = 0, started = false;
        showDLP(0);
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          chunks.push(value); received += value.length; const pct = total ? received / total : 0;
          if (!started) {
            showDLP(total ? Math.round(pct * 100) : null);
            if (pct >= thr || (!total && received > 2000000)) {
              started = true;
              const blob = new Blob([...chunks], { type: mime }), url = URL.createObjectURL(blob);
              if (audio._blobUrl) URL.revokeObjectURL(audio._blobUrl);
              audio._blobUrl = url; audio.src = url; audio.preload = "auto"; audio.load();
              clearDLP();
              /* State 2 — Armed: blob ready, user taps to play */
              playBtn.classList.add("is-armed");
              playBtn.textContent = "PLAY";
              playBtn.setAttribute("aria-label", "Play " + tr.title + " — ready");
            }
          } else if (total) { bufFill.style.background = "var(--blue)"; bufFill.style.width = Math.round(pct * 100) + "%"; }
        }
        const fb = new Blob(chunks, { type: mime }), fu = URL.createObjectURL(fb);
        if (!started) {
          if (audio._blobUrl) URL.revokeObjectURL(audio._blobUrl);
          audio._blobUrl = fu; audio.src = fu; audio.preload = "auto"; audio.load();
          clearDLP();
          /* State 2 — Armed */
          playBtn.classList.add("is-armed");
          playBtn.textContent = "PLAY";
          playBtn.setAttribute("aria-label", "Play " + tr.title + " — ready");
        }
        else { audio._fullBlobUrl = fu; setTimeout(() => { bufFill.style.background = ""; bufFill.style.width = "0%"; }, 800); }
      } catch (err) {
        clearTimeout(tout); clearDLP();
        if (!usedFallback && !ff) { await loadAndPlayAsBlob(idx, true); return; }
        showErr("// Streaming mode"); setTimeout(() => clearErr(), 3500);
        loadTrack(idx, false); setPlayState(false); /* ready — user taps PLAY */
      }
    }

    function showDLP(pct) {
      /* Always show "LOADING" — no percentage counter visible to listener.
         The buffer bar silently tracks progress behind the scenes.           */
      if (pct === 0) bufFill.style.width = "0%";
      playBtn.classList.remove("is-loading", "is-armed");
      playBtn.classList.add("is-loading-text");
      playBtn.textContent = "LOADING";
      playBtn.style.fontSize = "";
      playBtn.setAttribute("aria-label", "Loading audio");
      /* Advance buffer bar silently */
      if (pct !== null && pct > 0) bufFill.style.width = pct + "%";
      bufFill.style.background = "var(--blue)";
      bufFill.classList.remove("loading");
    }
    function clearDLP() { playBtn.classList.remove("is-loading", "is-loading-text"); playBtn.style.fontSize = ""; bufFill.style.background = ""; }

    /* BREAKBREAK → engine/audio.js — STREAMING FALLBACK */
    function waitForPrebuffer() {
      return new Promise(resolve => {
        const deadline = Date.now() + 6000;
        function check() {
          if (Date.now() > deadline) { resolve(); return; }
          if (!audio.duration || !audio.buffered.length) { requestAnimationFrame(check); return; }
          const b = audio.buffered.end(audio.buffered.length - 1);
          if (b >= Math.min(MIN_PREBUFFER_SECONDS, audio.duration)) { resolve(); }
          else { bufFill.style.width = Math.round((b / audio.duration) * 100) + "%"; bufFill.style.background = "var(--blue)"; requestAnimationFrame(check); }
        }
        check();
      });
    }
    setInterval(() => {
      if (USE_BLOB_LOADING) return;
      if (audio.paused || !audio.duration || !audio.buffered.length) return;
      const ahead = audio.buffered.end(audio.buffered.length - 1) - audio.currentTime;
      if (ahead < DANGER_SECONDS) {
        bufFill.style.background = "var(--blue-dim)";
      } else {
        bufFill.style.background = "";
      }
    }, 2000);

    /* ════════════════════════════════════════════════════════════════════════
       BREAKBREAK → components/track-list.js
    ════════════════════════════════════════════════════════════════════════ */
    function renderTracks() {
      trackList.innerHTML = "";
      const el = document.getElementById("trackCount");
      if (el) el.textContent = album.tracks.length + " Recording" + (album.tracks.length !== 1 ? "s" : "");

      album.tracks.forEach((tr, i) => {
        const li = document.createElement("li"), btn = document.createElement("button");
        btn.className = "track-btn"; btn.type = "button";
        btn.setAttribute("aria-current", "false");
        btn.setAttribute("aria-label", "Track " + (i + 1) + ": " + tr.title + " by " + album.artist);
        btn.innerHTML = '<span class="track-num" aria-hidden="true">' + String(i + 1).padStart(2, "0") + '</span><span class="track-info-col"><span class="track-title-text">' + tr.title + '</span><span class="track-meta-text">' + album.artist + '</span></span><span class="track-dur" aria-label="Duration: ' + tr.duration + '">' + tr.duration + '</span>';
        btn.addEventListener("click", () => { if (USE_BLOB_LOADING) loadAndPlayAsBlob(i); else playTrack(i); });
        li.appendChild(btn); trackList.appendChild(li);
      });

      /* BREAKBREAK → components/remix-uploader.js */
      const ACCEPTED_EXTS = ["m4a","flac","wav","mp3"];
      const ACCEPTED_MIME = ["audio/mp4","audio/flac","audio/x-flac","audio/wav","audio/x-wav","audio/mpeg"];
      const rl = document.createElement("li");
      rl.innerHTML = '<div class="remix-row" role="button" tabindex="0" aria-label="Submit a remix"><input class="remix-file-input" type="file" accept=".m4a,.flac,.wav,.mp3,audio/mp4,audio/flac,audio/x-flac,audio/wav,audio/mpeg" id="remixFileInput"/><div class="remix-icon-cell" aria-hidden="true"><img src="' + ICON_DARK + '" alt=""/></div><div class="remix-info"><span class="remix-title">Submit a Remix</span><span class="remix-sub">m4a · flac · wav · mp3</span></div><div class="remix-status" aria-live="polite" id="remixStatus">+ Add</div></div>';
      trackList.appendChild(rl);
      const toast = document.createElement("p"); toast.className = "upload-toast"; toast.setAttribute("aria-live", "polite");
      trackList.parentElement.appendChild(toast);

      document.getElementById("remixFileInput").addEventListener("change", function () {
        const file = this.files[0]; if (!file) return;
        const cta = document.getElementById("remixStatus");
        const ext  = file.name.split(".").pop().toLowerCase();
        const mime = (file.type || "").toLowerCase();
        const extOk  = ACCEPTED_EXTS.includes(ext);
        const mimeOk = ACCEPTED_MIME.some(m => mime.startsWith(m)) || mime === "";
        if (!extOk || !mimeOk) { cta.textContent = "REJECTED"; toast.textContent = "// Only .m4a, .flac, .wav, and .mp3 accepted."; toast.classList.add("show"); return; }
        cta.textContent = "✓ Received";
        toast.textContent = "// Received: " + file.name + " (" + (file.size / 1024 / 1024).toFixed(2) + " MB)";
        toast.classList.add("show");
        if (SONG_CONFIG.remixEndpoint) {
          const fd = new FormData(); fd.append("remix", file); fd.append("song", SONG_CONFIG.slug);
          fetch(SONG_CONFIG.remixEndpoint, { method: "POST", body: fd }).catch(err => { toast.textContent += " [Upload failed]"; console.error(err); });
        } else {
          console.log("[Remix] Would POST to /remixes/" + SONG_CONFIG.slug + "/" + file.name + " — set SONG_CONFIG.remixEndpoint to activate.");
        }
      });

      if (album.tracks.length === 1) { prevBtn.style.display = "none"; nextBtn.style.display = "none"; }
    }

    function updateTrackUI() { trackList.querySelectorAll(".track-btn").forEach((btn, i) => { const cur = i === currentIndex && isLoaded; btn.setAttribute("aria-current", cur ? "true" : "false"); btn.classList.toggle("is-playing", cur && !audio.paused); if (cur) btn.setAttribute("aria-label", "Track " + (i + 1) + ": " + album.tracks[i].title + " — " + (audio.paused ? "paused" : "now playing")); }); }

    /* Playback controls */
    function loadTrack(idx, f = false) { const si = Math.max(0, Math.min(idx, album.tracks.length - 1)), tr = album.tracks[si], { src, isFlac } = getBestSrc(tr, f); currentIndex = si; usedFallback = f || !isFlac; isLoaded = true; audio.src = src; audio.preload = "auto"; audio.load(); npTitle.textContent = tr.title; updateFmtBadge(isFlac); clearErr(); updateTrackUI(); updateMediaSession(tr); }
    async function playTrack(idx = currentIndex) { loadTrack(idx, false); setLoading(true); try { await waitForPrebuffer(); clearDLP(); setPlayState(false); /* ready — user taps PLAY */ } catch (err) { clearDLP(); showErr("// Playback failed"); } }
    async function togglePlay() {
      if (!isLoaded) { if (USE_BLOB_LOADING) await loadAndPlayAsBlob(currentIndex); else await playTrack(currentIndex); return; }
      if (audio.paused) {
        playBtn.classList.remove("is-armed");   /* remove armed state on play */
        try { await audio.play(); setPlayState(true); await acquireWake(); } catch (_) { showErr("// Could not resume"); }
      } else { audio.pause(); setPlayState(false); dropWake(); }
    }
    function playPrev() { if (audio.currentTime > 3 && isLoaded) { audio.currentTime = 0; return; } const i = Math.max(0, currentIndex - 1); if (USE_BLOB_LOADING) loadAndPlayAsBlob(i); else playTrack(i); }
    function playNext() { if (currentIndex < album.tracks.length - 1) { if (USE_BLOB_LOADING) loadAndPlayAsBlob(currentIndex + 1); else playTrack(currentIndex + 1); } else if (repeatMode === "album") { if (USE_BLOB_LOADING) loadAndPlayAsBlob(0); else playTrack(0); } else { setPlayState(false); dropWake(); } }
    function setPlayState(on) { playBtn.classList.remove("is-loading-text", "is-armed"); playBtn.textContent = on ? "PAUSE" : "PLAY"; playBtn.style.fontSize = ""; playBtn.setAttribute("aria-label", on ? "Pause " + album.tracks[currentIndex]?.title : "Play " + album.tracks[currentIndex]?.title); playBtn.classList.remove("is-loading"); artWrap.classList.toggle("is-playing", on); liveDot.classList.toggle("active", on); setMediaPlayState(on ? "playing" : "paused"); updateTrackUI(); }
    function setLoading(on) { if (on) { playBtn.innerHTML = ""; playBtn.classList.add("is-loading"); playBtn.setAttribute("aria-label", "Loading…"); bufFill.classList.add("loading"); } else { playBtn.classList.remove("is-loading"); bufFill.classList.remove("loading"); } }
    function cycleRepeat() { const modes = album.tracks.length === 1 ? ["off","song"] : ["off","song","album"]; repeatMode = modes[(modes.indexOf(repeatMode) + 1) % modes.length]; const m = { off:{l:"↺ Repeat: Off",p:"false"}, song:{l:"↺ Repeat: Song",p:"true"}, album:{l:"↺ Repeat: Album",p:"true"} }; repeatBtn.textContent = m[repeatMode].l; repeatBtn.dataset.mode = repeatMode; repeatBtn.setAttribute("aria-label", m[repeatMode].l + ". Press to cycle."); repeatBtn.setAttribute("aria-pressed", m[repeatMode].p); }

    /* Audio events */
    audio.addEventListener("ended", () => { if (upgradeToFullBlob()) return; if (repeatMode === "song") { audio.currentTime = 0; audio.play().catch(() => {}); return; } playNext(); });
    audio.addEventListener("playing", () => { bufFill.classList.remove("loading"); setPlayState(true); });
    audio.addEventListener("waiting", () => bufFill.classList.add("loading"));
    audio.addEventListener("pause",   () => { artWrap.classList.remove("is-playing"); liveDot.classList.remove("active"); updateTrackUI(); });
    audio.addEventListener("play",    () => updateTrackUI());
    let stallTimer;
    audio.addEventListener("stalled", () => {
      if (upgradeToFullBlob()) return;
      if (USE_BLOB_LOADING) return;
      clearTimeout(stallTimer);
      stallTimer = setTimeout(() => {
        if (!audio.paused) { audio.play().catch(() => {}); }
      }, 800);
    });
    audio.addEventListener("progress", () => clearTimeout(stallTimer));
    audio.addEventListener("playing",  () => clearTimeout(stallTimer));
    audio.addEventListener("error", async () => { if (USE_BLOB_LOADING) return; if (!usedFallback) { loadTrack(currentIndex, true); try { await audio.play(); setPlayState(true); } catch (_) { showErr("// Signal lost"); } } else showErr("// Playback failed"); });

    /* Progress */
    const fmt = s => !Number.isFinite(s) || s < 0 ? "0:00" : Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");
    audio.addEventListener("loadedmetadata", () => { durTimeEl.textContent = fmt(audio.duration); progBar.setAttribute("aria-valuemax", Math.floor(audio.duration)); const d = trackList.querySelectorAll(".track-dur"); if (d[currentIndex]) d[currentIndex].textContent = fmt(audio.duration); });
    audio.addEventListener("timeupdate", () => { if (isSeeking || !Number.isFinite(audio.duration) || !audio.duration) return; progBar.value = (audio.currentTime / audio.duration) * 100; progBar.setAttribute("aria-valuenow", Math.floor(audio.currentTime)); progBar.setAttribute("aria-valuetext", fmt(audio.currentTime) + " of " + fmt(audio.duration)); curTimeEl.textContent = fmt(audio.currentTime); updateMediaPosition(); });
    audio.addEventListener("progress", () => { if (USE_BLOB_LOADING) return; if (!audio.duration || !audio.buffered.length) return; bufFill.style.width = (audio.buffered.end(audio.buffered.length - 1) / audio.duration) * 100 + "%"; });
    progBar.addEventListener("mousedown",  () => isSeeking = true);
    progBar.addEventListener("touchstart", () => isSeeking = true, { passive: true });
    progBar.addEventListener("input", () => { if (audio.duration) { const t = (progBar.value / 100) * audio.duration; curTimeEl.textContent = fmt(t); progBar.setAttribute("aria-valuetext", fmt(t) + " of " + fmt(audio.duration)); } });
    progBar.addEventListener("change", () => { if (audio.duration) audio.currentTime = (progBar.value / 100) * audio.duration; isSeeking = false; });
    progBar.addEventListener("mouseup",  () => isSeeking = false);
    progBar.addEventListener("touchend", () => isSeeking = false);
    /* Volume slider removed from UI — system volume used instead */

    /* BREAKBREAK → engine/media-session.js */
    function updateMediaSession(tr) {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: tr.title, artist: album.artist, album: album.title,
        artwork: [{ src: album.artworkUrl, sizes: "512x512", type: "image/png" }]
      });
      const h = { play: async () => { await togglePlay(); }, pause: () => { audio.pause(); setPlayState(false); dropWake(); }, previoustrack: playPrev, nexttrack: playNext, seekbackward: e => { audio.currentTime = Math.max(0, audio.currentTime - (e.seekOffset || 10)); }, seekforward: e => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + (e.seekOffset || 10)); }, seekto: e => { if (e.fastSeek && "fastSeek" in audio) audio.fastSeek(e.seekTime); else audio.currentTime = e.seekTime; } };
      for (const [a, fn] of Object.entries(h)) { try { navigator.mediaSession.setActionHandler(a, fn); } catch (_) {} }
    }
    function setMediaPlayState(s) { if ("mediaSession" in navigator) navigator.mediaSession.playbackState = s; }
    function updateMediaPosition() { if (!("mediaSession" in navigator) || !Number.isFinite(audio.duration)) return; try { navigator.mediaSession.setPositionState({ duration: audio.duration, playbackRate: audio.playbackRate, position: audio.currentTime }); } catch (_) {} }

    /* Keyboard */
    document.addEventListener("keydown", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      switch (e.key) {
        case " ": case "MediaPlayPause": e.preventDefault(); togglePlay(); break;
        case "ArrowRight": e.preventDefault(); audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); break;
        case "ArrowLeft":  e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 10); break;
        case "ArrowUp":    e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.05); if (volBar) volBar.value = Math.round(audio.volume * 100); break;
        case "ArrowDown":  e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.05); if (volBar) volBar.value = Math.round(audio.volume * 100); break;
        case "n": case "N": case "MediaTrackNext":     playNext(); break;
        case "p": case "P": case "MediaTrackPrevious": playPrev(); break;
        case "r": case "R": cycleRepeat(); break;
        case "m": case "M": audio.muted = !audio.muted; break;
      }
    });

    /* BREAKBREAK → components/share-strip.js */
    function initShareStrip() {
      const btnNative = document.getElementById("btnNativeShare");
      const btnCopy   = document.getElementById("btnCopyLink");
      const shareData = {
        title: SONG_CONFIG.title + " — " + SONG_CONFIG.artist,
        text:  "Listen to " + SONG_CONFIG.title + " by " + SONG_CONFIG.artist,
        url:   SONG_CONFIG.pageUrl,
      };
      if (navigator.share) {
        btnNative.addEventListener("click", () => { navigator.share(shareData).catch(() => {}); });
      } else { btnNative.classList.add("hidden"); }
      if (navigator.clipboard) {
        btnCopy.addEventListener("click", () => {
          navigator.clipboard.writeText(SONG_CONFIG.pageUrl).then(() => {
            btnCopy.classList.add("copied");
            setTimeout(() => btnCopy.classList.remove("copied"), 2000);
          }).catch(() => {});
        });
      } else { btnCopy.classList.add("hidden"); }
    }

    /* BREAKBREAK → components/masthead.js */
    function initMasthead() {
      const eyebrow = document.getElementById("mastheadEyebrow");
      if (eyebrow) {
        const albumPart = SONG_CONFIG.albumUrl
          ? '<a href="' + SONG_CONFIG.albumUrl + '">' + SONG_CONFIG.album + '</a>'
          : '';
        const artistPart = '<a href="' + buildArtistUrl("header") + '" target="_blank" rel="noopener noreferrer" aria-label="' + SONG_CONFIG.artistLabel + ' (opens in new tab)">' + SONG_CONFIG.artist + '</a>';
        eyebrow.innerHTML = albumPart ? albumPart + ' \u00B7 ' + artistPart : artistPart;
      }
    }

    function initFooter() {
      const link = document.getElementById("footerArtistLink");
      if (link) { link.href = buildArtistUrl("footer"); link.textContent = SONG_CONFIG.artist; link.setAttribute("aria-label", SONG_CONFIG.artistLabel + " (opens in new tab)"); }
    }

    function showErr(m) { errLine.textContent = m; errLine.classList.add("show"); }
    function clearErr()  { errLine.textContent = ""; errLine.classList.remove("show"); }

    playBtn.addEventListener("click",   togglePlay);
    prevBtn.addEventListener("click",   playPrev);
    nextBtn.addEventListener("click",   playNext);
    repeatBtn.addEventListener("click", cycleRepeat);

    /* BREAKBREAK → main.js — INIT */
    function init() {
      document.getElementById("albumArtImg").src = ALBUM_ART_URL;
      initMasthead();
      initFooter();
      initShareStrip();
      renderTracks();
      if (!USE_BLOB_LOADING) { loadTrack(0); isLoaded = false; }
      updateMediaSession(album.tracks[0]);
      setPlayState(false);
      updateFmtBadge(flacOk);
    }

    init();
  </script>
</body>
</html>
