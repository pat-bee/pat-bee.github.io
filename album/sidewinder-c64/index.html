<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta property="og:type"         content="music.song" />

  <meta name="twitter:description" content="Listen to Sidewinder by Pat Bɇɇ" />
  <meta name="twitter:image"       content="https://pub-8ca7a487f9234c669dfad0530698bfe0.r2.dev/sidewinder.png" />

  <link rel="preconnect" href="https://pub-8ca7a487f9234c669dfad0530698bfe0.r2.dev" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════════
       SIDEWINDER DESIGN SYSTEM
         #9fb1bf  — Hull grey ground
         #0e1820  — Dark charcoal structural ink
         #b08a16  — Cadmium yellow accent
    ═══════════════════════════════════════════════════════════ */
    :root {
      --bg:              #9fb1bf;
      --bg-panel:        #a9bbc9;
      --bg-raised:       #93a5b3;
      --bg-inset:        #879aa8;
      --bg-deep:         #7b8e9c;
      --text:            #0e1820;
      --text-mid:        #1e2e3c;
      --text-dim:        #36485a;
      --text-faint:      rgba(14,24,32,0.18);
      --text-ghost:      rgba(14,24,32,0.07);
      --yellow:          #b08a16;
      --yellow-bright:   #cca020;
      --yellow-pale:     rgba(176,138,22,0.2);
      --yellow-faint:    rgba(176,138,22,0.09);
      --yellow-border:   rgba(176,138,22,0.52);
      --border:          rgba(14,24,32,0.18);
      --border-mid:      rgba(14,24,32,0.32);
      --border-strong:   rgba(14,24,32,0.54);
      --focus-ring:      #7a5008;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .skip-link {
      position: absolute; top: -100%; left: 12px; z-index: 99999;
      background: var(--yellow); color: #0e1820;
      padding: 8px 18px; font-family: 'Courier Prime', monospace;
      font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.1em; text-decoration: none; transition: top 200ms;
    }
    .skip-link:focus { top: 0; }
    :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 3px; }

    html {
      background: var(--bg); color: var(--text);
      font-family: 'Courier Prime', 'Courier New', monospace;
      min-height: 100%; -webkit-text-size-adjust: 100%;
    }

    /* Hull panel texture — stringer seams + bulkhead lines */
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 10% 35%, rgba(180,196,210,0.4), transparent 55%),
        radial-gradient(ellipse at 90% 65%, rgba(140,158,172,0.3), transparent 55%),
        repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(14,24,32,0.09) 47px, rgba(14,24,32,0.09) 48px),
        repeating-linear-gradient(90deg, transparent, transparent 63px, rgba(14,24,32,0.06) 63px, rgba(14,24,32,0.06) 64px),
        #9fb1bf;
      color: #0e1820; position: relative; overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(14,24,32,0.14) 1px, transparent 1px);
      background-size: 32px 32px; background-position: 16px 16px;
    }
    body::after {
      content: "PROPULSION SECTION · ARMAMENT SECTION · GUIDANCE SECTION · CONTROL SECTION · SERNO ████ · LIFT HERE · PROPULSION SECTION · ARMAMENT SECTION ·";
      position: fixed; inset: 0; z-index: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Courier Prime', monospace; font-size: 0.44rem;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(14,24,32,0.04); text-align: center; line-height: 5.5;
      pointer-events: none; word-break: break-all;
    }

    button { font-family: 'Courier Prime', monospace; color: inherit; cursor: pointer; }

    .page-shell {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 20px 60px;
    }
    .inner { width: 100%; max-width: 880px; }

    /* ═══════════════════════════════════════════════════════════
       MASTHEAD
    ═══════════════════════════════════════════════════════════ */
    .masthead {
      position: relative; padding: 22px 26px 18px;
      background: linear-gradient(180deg, rgba(180,196,210,0.5) 0%, rgba(140,158,172,0.6) 100%), #a9bbc9;
      border: 1px solid var(--border-strong); border-bottom: 3px solid var(--yellow);
      overflow: hidden;
    }
    .masthead::before {
      content: "· · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · ·";
      position: absolute; top: 5px; left: 0; right: 0; font-size: 0.48rem;
      letter-spacing: 0.3em; color: rgba(14,24,32,0.16); pointer-events: none;
      overflow: hidden; white-space: nowrap; font-family: 'Courier Prime', monospace;
    }
    .masthead::after {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(220,234,244,0.7) 30%, rgba(240,248,255,0.9) 50%, rgba(220,234,244,0.7) 70%, transparent);
    }
    .masthead-inner {
      display: grid; grid-template-columns: 1fr auto; align-items: end;
      gap: 12px; position: relative; z-index: 1; padding-top: 8px;
    }
    .masthead-titles { min-width: 0; overflow: hidden; container-type: inline-size; }
    .masthead-eyebrow {
      font-family: 'Courier Prime', monospace; font-size: 0.56rem;
      letter-spacing: 0.38em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px;
    }
    .masthead-title {
      font-family: 'Electrolize', sans-serif; font-weight: 400;
      font-size: clamp(0.5rem, 10cqi, 5.5rem);
      white-space: nowrap; overflow: hidden; text-overflow: clip;
      line-height: 0.9; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text);
    }
    .masthead-sub {
      margin-top: 7px; font-family: 'Courier Prime', monospace;
      font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-mid);
    }
    .masthead-artist {
      text-align: right; font-family: 'Courier Prime', monospace; font-size: 0.62rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-mid);
      white-space: nowrap; align-self: start; padding-top: 8px;
    }

    /* ── MAIN GRID ─────────────────────────────────────────── */
    .main-grid {
      display: grid; grid-template-columns: minmax(210px, 340px) 1fr;
      border: 1px solid var(--border); border-top: none; background-color: #a9bbc9;
    }
    .col-art { border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .col-player { padding: 20px; display: flex; flex-direction: column; gap: 13px; min-width: 0; }

    /* ── ALBUM ART ─────────────────────────────────────────── */
    .art-wrap {
      position: relative; width: 100%; aspect-ratio: 1/1;
      border: 1px solid var(--border-mid); overflow: hidden;
      background: #7b8e9c; box-shadow: inset 0 0 20px rgba(14,24,32,0.25);
    }
    .art-wrap::before {
      content: ""; position: absolute; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(14,24,32,0.35) 100%);
    }
    .art-wrap::after {
      content: ""; position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(14,24,32,0.09) 31px, rgba(14,24,32,0.09) 32px);
    }
    .art-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      position: relative; z-index: 2;
      filter: contrast(1.04) brightness(0.93) saturate(0.85); transition: filter 700ms;
    }
    .art-wrap.is-playing img { animation: hull-shimmer 6s ease-in-out infinite alternate; }
    @keyframes hull-shimmer {
      from { filter: contrast(1.04) brightness(0.93) saturate(0.85); }
      to   { filter: contrast(1.09) brightness(0.98) saturate(0.90); }
    }

    .album-label { text-align: center; }
    .album-label-name {
      font-family: 'Electrolize', sans-serif; font-weight: 400;
      font-size: 0.88rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text);
    }
    .album-label-artist {
      font-family: 'Courier Prime', monospace; font-size: 0.56rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-top: 4px;
    }

    /* ── NOW PLAYING ───────────────────────────────────────── */
    .np-label {
      font-family: 'Courier Prime', monospace; font-size: 0.52rem;
      letter-spacing: 0.32em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 3px;
    }
    .np-title {
      font-family: 'Electrolize', sans-serif; font-weight: 400;
      font-size: 1.25rem; line-height: 1.0; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text); word-break: break-word;
    }
    .np-meta { display: flex; gap: 8px; margin-top: 7px; flex-wrap: wrap; align-items: center; }

    .live-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-ghost); border: 1px solid var(--border);
      flex-shrink: 0; transition: all 200ms;
    }
    .live-dot.active {
      background: var(--yellow); border-color: var(--yellow-bright);
      box-shadow: 0 0 8px rgba(176,138,22,0.45);
      animation: indicator-blink 1.1s ease-in-out infinite;
    }
    @keyframes indicator-blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .badge {
      font-family: 'Courier Prime', monospace; font-size: 0.52rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 2px 7px; border: 1px solid var(--border);
      color: var(--text-mid); background: transparent;
    }
    /* FLAC download badge — cadmium yellow accent, clearly interactive */
    .badge-download {
      border-color: var(--yellow-border); color: #6a4800;
      text-decoration: none; cursor: pointer;
      transition: background 120ms, border-color 120ms, color 120ms;
    }
    .badge-download:hover { background: var(--yellow-faint); border-color: var(--yellow-bright); color: #4a3000; }

    /* ── BUFFER BAR ────────────────────────────────────────── */
    .buf-wrap { width: 100%; height: 2px; background: var(--text-ghost); }
    .buf-fill { height: 100%; background: var(--text-dim); width: 0%; transition: width 500ms; }
    .buf-fill.loading { animation: buf-pulse 0.9s ease-in-out infinite; }
    @keyframes buf-pulse { 0%,100%{opacity:0.2} 50%{opacity:0.8} }

    /* ── PROGRESS BAR ──────────────────────────────────────── */
    .prog-row {
      display: grid; grid-template-columns: 46px 1fr 46px; gap: 8px; align-items: center;
      font-family: 'Courier Prime', monospace; font-size: 0.68rem;
      color: var(--text-mid); font-variant-numeric: tabular-nums;
    }
    .prog-bar {
      appearance: none; width: 100%; height: 7px;
      background: rgba(14,24,32,0.12); border: 1px solid var(--border-mid);
      border-radius: 0; cursor: pointer;
    }
    .prog-bar::-webkit-slider-thumb {
      appearance: none; width: 12px; height: 20px;
      background: var(--yellow); border: 1px solid var(--yellow-bright); border-radius: 1px; cursor: pointer;
    }
    .prog-bar::-moz-range-thumb {
      width: 12px; height: 20px;
      background: var(--yellow); border: 1px solid var(--yellow-bright); border-radius: 1px; cursor: pointer;
    }

    /* ── VOLUME ────────────────────────────────────────────── */
    .vol-row { display: flex; align-items: center; gap: 10px; }
    .vol-label {
      font-family: 'Courier Prime', monospace; font-size: 0.52rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); min-width: 44px;
    }
    .vol-bar {
      appearance: none; flex: 1; height: 5px;
      background: rgba(14,24,32,0.09); border: 1px solid var(--border); border-radius: 0; cursor: pointer;
    }
    .vol-bar::-webkit-slider-thumb {
      appearance: none; width: 10px; height: 16px; background: var(--text-mid); border-radius: 0; cursor: pointer;
    }
    .vol-bar::-moz-range-thumb { width: 10px; height: 16px; background: var(--text-mid); border-radius: 0; cursor: pointer; }
    .vol-pct {
      font-family: 'Courier Prime', monospace; font-size: 0.6rem;
      color: var(--text-dim); font-variant-numeric: tabular-nums; min-width: 34px; text-align: right;
    }

    /* ═══════════════════════════════════════════════════════════
       CONTROLS
    ═══════════════════════════════════════════════════════════ */
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .ctrl-btn {
      border: 1px solid var(--border-mid); background: #93a5b3;
      color: var(--text-mid); font-family: 'Courier Prime', monospace;
      font-weight: 700; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0 14px; min-height: 38px;
      transition: background 120ms, border-color 120ms, color 120ms, transform 80ms;
      position: relative; overflow: hidden;
    }
    .ctrl-btn:hover { background: rgba(14,24,32,0.06); border-color: var(--border-strong); color: var(--text); }
    .ctrl-btn:active { transform: translate(1px,1px); }

    /* PLAY — large, yellow, unmissable */
    .play-btn {
      min-width: 144px; min-height: 54px;
      font-family: 'Electrolize', sans-serif; font-weight: 400;
      font-size: 1.15rem; letter-spacing: 0.14em;
      background: var(--yellow); color: #0e1820;
      border: 1px solid var(--yellow-bright);
      box-shadow: 3px 3px 0 rgba(14,24,32,0.3), 0 0 0 1px rgba(176,138,22,0.2);
    }
    .play-btn:hover {
      background: var(--yellow-bright); border-color: var(--yellow-bright); color: #0e1820;
      box-shadow: 4px 4px 0 rgba(14,24,32,0.25), 0 0 14px rgba(176,138,22,0.22);
    }
    .play-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(14,24,32,0.3); }

    /* Loading state */
    .play-btn.is-loading-text {
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem; letter-spacing: 0.08em;
      animation: loading-pulse 1.8s ease-in-out infinite;
    }
    @keyframes loading-pulse { 0%,100%{opacity:0.55} 50%{opacity:1.00} }

    /* State 2 — Armed: brighter yellow + outer glow = loaded and ready */
    .play-btn.is-armed {
      background: var(--yellow-bright);
      border-color: var(--yellow-bright);
      box-shadow: 3px 3px 0 rgba(14,24,32,0.3), 0 0 0 3px var(--yellow-border);
    }
    .play-btn.is-loading { background: #93a5b3; border-color: var(--border); cursor: wait; }
    .play-btn.is-loading::after {
      content: ""; position: absolute; top:50%; left:50%;
      width: 16px; height: 16px;
      border: 2px solid rgba(176,138,22,0.3); border-top-color: var(--yellow-bright);
      border-radius: 50%; transform: translate(-50%,-50%);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .repeat-btn { min-width: 132px; font-size: 0.64rem; }
    .repeat-btn[data-mode="song"]  { border-color: var(--yellow-border); color: #6a4800; }
    .repeat-btn[data-mode="album"] { border-style: dashed; color: var(--text-mid); }

    .kbd-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .kbd-hint { font-size: 0.52rem; color: var(--text-dim); text-transform: uppercase; }
    kbd {
      display: inline-block; padding: 0 4px; border: 1px solid var(--border-mid);
      font-size: 0.52rem; font-family: inherit; color: var(--text-mid); background: #879aa8;
    }

    .status-line {
      font-family: 'Courier Prime', monospace; font-size: 0.54rem;
      color: var(--text-dim); line-height: 1.5; letter-spacing: 0.04em;
    }
    .err-line {
      font-family: 'Courier Prime', monospace; font-size: 0.62rem;
      color: #6a3800; display: none; line-height: 1.4;
      border-left: 2px solid var(--yellow-border); padding-left: 8px;
    }
    .err-line.show { display: block; }

    /* ═══════════════════════════════════════════════════════════
       PLAYLIST — loadout manifest aesthetic
    ═══════════════════════════════════════════════════════════ */
    .playlist-section { border: 1px solid var(--border); border-top: none; background-color: #a9bbc9; }
    .playlist-header {
      padding: 8px 20px; border-bottom: 1px solid var(--border);
      font-family: 'Courier Prime', monospace; font-size: 0.52rem;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-dim);
      display: flex; justify-content: space-between; align-items: center;
    }
    .playlist-header::before { content: "// LOADOUT MANIFEST"; font-size: 0.44rem; color: rgba(14,24,32,0.2); letter-spacing: 0.1em; }

    .track-list { list-style: none; }
    .track-btn, .remix-row {
      width: 100%; display: grid; grid-template-columns: 54px 1fr auto;
      align-items: stretch; text-align: left;
      border: none; border-bottom: 1px solid var(--border); transition: background 100ms;
    }
    .track-list li:last-child .track-btn,
    .track-list li:last-child .remix-row { border-bottom: none; }

    .track-btn { background: transparent; cursor: pointer; }
    .track-btn:hover { background: rgba(14,24,32,0.06); }
    .track-btn[aria-current="true"] { background: var(--yellow-faint); box-shadow: inset 3px 0 0 var(--yellow); }
    .track-btn[aria-current="true"] .track-num { color: #6a4800; }
    .track-btn[aria-current="true"].is-playing .track-num { animation: indicator-blink 1.1s ease-in-out infinite; }

    .track-num {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 0; border-right: 1px solid var(--border);
      font-family: 'Electrolize', sans-serif; font-weight: 400;
      font-size: 0.95rem; letter-spacing: 0.08em; color: var(--text-dim); min-width: 54px;
    }
    .track-info-col { padding: 13px 16px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
    .track-title-text {
      font-family: 'Electrolize', sans-serif; font-weight: 400;
      font-size: 0.88rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-meta-text { font-family: 'Courier Prime', monospace; font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; }
    .track-dur {
      display: flex; align-items: center; padding: 13px 14px;
      font-family: 'Courier Prime', monospace; font-size: 0.68rem;
      color: var(--text-dim); border-left: 1px solid var(--border);
      white-space: nowrap; font-variant-numeric: tabular-nums;
    }

    /* Remix row — yellow safety-band */
    .remix-row { background: var(--yellow-faint); border-top: 1px dashed var(--yellow-border); cursor: pointer; position: relative; }
    .remix-row:hover { background: var(--yellow-pale); }
    .remix-row:focus-within { outline: 2px solid var(--focus-ring); outline-offset: -2px; }
    .remix-file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
    .remix-icon-cell { display: flex; align-items: center; justify-content: center; padding: 12px 0; border-right: 1px dashed var(--yellow-border); min-width: 54px; }
    .remix-icon-cell img { width: 26px; height: 26px; object-fit: contain; opacity: 0.55; }
    .remix-info { padding: 11px 16px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
    .remix-title { font-family: 'Electrolize', sans-serif; font-weight: 400; font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; color: #6a4800; }
    .remix-sub { font-family: 'Courier Prime', monospace; font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; }
    .remix-cta { display: flex; align-items: center; padding: 11px 14px; font-family: 'Courier Prime', monospace; font-size: 0.58rem; color: #6a4800; border-left: 1px dashed var(--yellow-border); white-space: nowrap; letter-spacing: 0.1em; text-transform: uppercase; }
    .upload-toast { display: none; padding: 8px 20px; font-family: 'Courier Prime', monospace; font-size: 0.56rem; color: var(--text-mid); letter-spacing: 0.06em; background: var(--yellow-faint); border-top: 1px solid var(--border); }
    .upload-toast.show { display: block; }

    /* Footer */
    .page-footer { margin-top: 20px; text-align: center; width: 100%; }
    .page-footer a {
      font-family: 'Courier Prime', monospace; font-size: 0.64rem;
      letter-spacing: 0.26em; text-transform: uppercase; color: var(--text-mid);
      text-decoration: none; border-bottom: 1px solid var(--border-mid);
      padding-bottom: 2px; transition: color 160ms, border-color 160ms;
    }
    .page-footer a:hover { color: #6a4800; border-color: var(--yellow-border); }

    /* Mobile */
    @media (max-width: 640px) {
      .page-shell { padding: 14px 12px 44px; }
      .masthead-inner { grid-template-columns: 1fr; }
      .masthead-artist { text-align: left; padding-top: 4px; }
      .main-grid { grid-template-columns: 1fr; }
      .col-art { border-right: none; border-bottom: 1px solid var(--border); padding: 14px; }
      .col-player { padding: 14px; }
      .art-wrap { max-width: 360px; margin: 0 auto; }
      .kbd-row { display: none; }
      .track-btn, .remix-row { grid-template-columns: 44px 1fr auto; }
      .track-num, .remix-icon-cell { min-width: 44px; }
    }

    audio { position: fixed; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <main class="page-shell" id="main-content">
    <div class="inner">

      <header class="masthead" role="banner">
        <div class="masthead-inner">
          <div class="masthead-titles">
            <p class="masthead-eyebrow">Guided Recordings · Single</p>
            <h1 class="masthead-title">Sidewinder</h1>
            <p class="masthead-sub">Pat Bɇɇ</p>
          </div>
          <p class="masthead-artist" aria-label="Artist: Pat Bɇɇ">Pat Bɇɇ</p>
        </div>
      </header>

      <div class="main-grid">
        <div class="col-art">
          <div class="art-wrap" id="artWrap">
            <img id="albumArtImg" src="" alt="Sidewinder by Pat Bɇɇ — cover art" />
          </div>
          <div class="album-label">
            <div class="album-label-name">Sidewinder</div>
            <div class="album-label-artist">Pat Bɇɇ</div>
          </div>
        </div>

        <div class="col-player">
          <div aria-live="polite" aria-atomic="true">
            <p class="np-label">Now Playing</p>
            <p class="np-title" id="npTitle">Sidewinder</p>
            <div class="np-meta">
              <span class="live-dot" id="liveDot" aria-hidden="true"></span>
              <span class="badge badge-fmt" id="fmtBadge" aria-label="Audio format">M4A</span>
              <a class="badge badge-download" id="downloadFlac" href="" target="_blank" rel="noopener" aria-label="Download lossless FLAC file">↓ FLAC</a>
            </div>
          </div>

          <div class="buf-wrap" aria-hidden="true"><div class="buf-fill" id="bufFill"></div></div>

          <div class="prog-row">
            <span id="curTime" aria-label="Current time">0:00</span>
            <input id="progBar" class="prog-bar" type="range" min="0" max="100" value="0" step="0.1"
              aria-label="Track progress" aria-valuetext="0 seconds" />
            <span id="durTime" aria-label="Total duration">0:00</span>
          </div>

          <div class="vol-row">
            <label class="vol-label" for="volBar">Vol</label>
            <input id="volBar" class="vol-bar" type="range" min="0" max="100" value="100" step="1" aria-label="Volume" />
            <span class="vol-pct" id="volPct" aria-live="polite">100%</span>
          </div>

          <div class="controls" role="group" aria-label="Playback controls">
            <button class="ctrl-btn" id="prevBtn" type="button" aria-label="Previous track">← Prev</button>
            <button class="ctrl-btn play-btn" id="playBtn" type="button" aria-label="Play Sidewinder">▶ Play</button>
            <button class="ctrl-btn" id="nextBtn" type="button" aria-label="Next track">Next →</button>
            <button class="ctrl-btn repeat-btn" id="repeatBtn" type="button"
              data-mode="off" aria-label="Repeat mode: off. Press to cycle." aria-pressed="false">↺ Repeat: Off</button>
          </div>

          <div class="kbd-row" aria-hidden="true">
            <span class="kbd-hint"><kbd>Space</kbd> Play/Pause</span>
            <span class="kbd-hint"><kbd>←</kbd><kbd>→</kbd> Seek 10s</span>
            <span class="kbd-hint"><kbd>N</kbd><kbd>P</kbd> Track</span>
            <span class="kbd-hint"><kbd>↑</kbd><kbd>↓</kbd> Vol</span>
            <span class="kbd-hint"><kbd>M</kbd> Mute</span>
          </div>

          <p class="status-line" id="statusLine">// TAP PLAY TO BEGIN. BACKGROUND PLAYBACK ACTIVE AFTER FIRST INTERACTION.</p>
          <p class="err-line" id="errLine" role="alert" aria-live="assertive"></p>
        </div>
      </div>

      <section class="playlist-section" aria-label="Tracklist">
        <div class="playlist-header" aria-hidden="true">
          <span id="trackCount">1 Target</span>
        </div>
        <ol class="track-list" id="trackList" aria-label="Album tracks"></ol>
      </section>

      <footer class="page-footer">
        <a href="https://www.instagram.com/patbee.music/" target="_blank" rel="noopener noreferrer"
           aria-label="Pat Bɇɇ on Instagram (opens in new tab)">Pat Bɇɇ</a>
      </footer>

    </div>
  </main>

  <audio id="audioEl" preload="metadata" playsinline x-webkit-airplay="allow"></audio>

  <script>
    /* ════════════════════════════════════════════════════════════
       SIDEWINDER — M4A STREAMING ENGINE
       M4A is the playback format. FLAC is download-only via the ↓ FLAC button.
       Browser streams M4A natively. No blob loading. No partial blobs.
    ════════════════════════════════════════════════════════════ */

    const CDN_BASE_URL  = "https://pub-8ca7a487f9234c669dfad0530698bfe0.r2.dev";
    const ALBUM_ART_URL = CDN_BASE_URL + "/sidewinder.png";

    const album = {
      title:      "Sidewinder",
      artist:     "Pat Bɇɇ",
      artworkUrl: ALBUM_ART_URL,
      tracks: [
        {
          title:    "Sidewinder",
          duration: "—",
          src:      CDN_BASE_URL + "/sidewinder.m4a",   /* M4A — streamed */
          flac:     CDN_BASE_URL + "/sidewinder.flac",  /* FLAC — download */
        }
      ]
    };

    /* Upload icon for remix row — base64 embedded */
    const ICON_DARK = "data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/wAARCABAAEADASIAAhEBAxEB/8QAGwABAAIDAQAAAAAAAAAAAAAAAAUGAwQHAf/EACkQAAIBAwMEAgIDAQAAAAAAAAECAwQFERIhMUFRYRMiBoEUMpH/xAAWAQEBAQAAAAAAAAAAAAAAAAAAAQL/xAAWEQEBAQAAAAAAAAAAAAAAAAAAARH/2gAMAwEAAhEDEQA/AOuAAAAAAAAADHuLmnbU3UqPCX8mEW5PCKK3vrq9qONGDhT75PN/EuhXrk6VCo4w+a5x7l8AW7QAAAAAAAAB5q04VoOFSKlF8pp5QAAAAAAB4qU4VYOFSKlF8pp5QAAAAHqnSp0oKNOEYRXCilhIAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//2Q==";

    /* ════════════════════════════════════════════════════════════
       DOM REFERENCES
    ════════════════════════════════════════════════════════════ */
    const audio     = document.getElementById("audioEl");
    const playBtn   = document.getElementById("playBtn");
    const prevBtn   = document.getElementById("prevBtn");
    const nextBtn   = document.getElementById("nextBtn");
    const repeatBtn = document.getElementById("repeatBtn");
    const progBar   = document.getElementById("progBar");
    const curTimeEl = document.getElementById("curTime");
    const durTimeEl = document.getElementById("durTime");
    const bufFill   = document.getElementById("bufFill");
    const volBar    = document.getElementById("volBar");
    const volPctEl  = document.getElementById("volPct");
    const npTitle   = document.getElementById("npTitle");
    const fmtBadge  = document.getElementById("fmtBadge");
    const liveDot   = document.getElementById("liveDot");
    const errLine   = document.getElementById("errLine");
    const artWrap   = document.getElementById("artWrap");
    const trackList = document.getElementById("trackList");

    /* ════════════════════════════════════════════════════════════
       STATE
    ════════════════════════════════════════════════════════════ */
    let currentIndex = 0, isLoaded = false;
    let isSeeking = false, repeatMode = "off";
    let wakeLock = null;

    /* ════════════════════════════════════════════════════════════
       WAKE LOCK — keeps screen alive during playback (no badge UI)
    ════════════════════════════════════════════════════════════ */
    async function acquireWake() {
      if (!("wakeLock" in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => { if (!audio.paused) acquireWake(); });
      } catch (_) {}
    }
    async function dropWake() {
      if (wakeLock) { try { await wakeLock.release(); } catch (_) {} wakeLock = null; }
    }
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && !audio.paused) acquireWake();
    });

    /* ════════════════════════════════════════════════════════════
       AUDIO ENGINE — M4A STREAMING
       loadTrack points audio.src at the M4A CDN URL.
       Browser handles HTTP range requests natively.
       canplay fires when enough is buffered → armButton().
    ════════════════════════════════════════════════════════════ */
    function loadTrack(idx) {
      const si = Math.max(0, Math.min(idx, album.tracks.length - 1));
      const tr = album.tracks[si];
      currentIndex = si; isLoaded = false;
      npTitle.textContent = tr.title;
      clearErr(); updateTrackUI(); updateMediaSession(tr);
      audio.src = tr.src;   /* M4A */
      audio.preload = "auto";
      audio.load();
    }

    /* showLoadingState — Loading phase */
    function showLoadingState() {
      playBtn.classList.remove("is-armed");
      playBtn.classList.add("is-loading-text");
      playBtn.textContent = "LOADING…";
      playBtn.setAttribute("aria-label", "Loading audio");
      bufFill.classList.add("loading");
      bufFill.style.background = "var(--yellow)";
    }

    /* armButton — State 2: CDN buffered, tap to play */
    function armButton() {
      playBtn.classList.remove("is-loading", "is-loading-text");
      playBtn.classList.add("is-armed");
      playBtn.textContent = "▶ Play";
      playBtn.setAttribute("aria-label", "Play " + album.tracks[currentIndex].title + " — ready");
      bufFill.classList.remove("loading");
      bufFill.style.background = "";
      bufFill.style.width = "0%";
    }

    /* canplay — fires when enough data is buffered to start */
    audio.addEventListener("canplay", () => {
      if (!isLoaded) { isLoaded = true; armButton(); }
    });

    /* togglePlay — main play/pause */
    async function togglePlay() {
      if (!isLoaded) {
        loadTrack(currentIndex);
        showLoadingState();
        return;
      }
      if (audio.paused) {
        playBtn.classList.remove("is-armed");
        try { await audio.play(); setPlayState(true); await acquireWake(); }
        catch (_) { showErr("// COULD NOT START — TAP PLAY AGAIN"); }
      } else {
        audio.pause(); setPlayState(false); dropWake();
      }
    }

    function playPrev() {
      if (audio.currentTime > 3 && isLoaded) { audio.currentTime = 0; return; }
      loadTrack(Math.max(0, currentIndex - 1));
      showLoadingState();
    }
    function playNext() {
      if (currentIndex < album.tracks.length - 1) {
        loadTrack(currentIndex + 1); showLoadingState();
      } else if (repeatMode === "album") {
        loadTrack(0); showLoadingState();
      } else { setPlayState(false); dropWake(); }
    }

    function setPlayState(on) {
      playBtn.classList.remove("is-loading-text", "is-armed", "is-loading");
      playBtn.textContent = on ? "⏸ Pause" : "▶ Play";
      playBtn.setAttribute("aria-label",
        on ? "Pause " + album.tracks[currentIndex]?.title
           : "Play "  + album.tracks[currentIndex]?.title);
      artWrap.classList.toggle("is-playing", on);
      liveDot.classList.toggle("active", on);
      setMediaPlayState(on ? "playing" : "paused");
      updateTrackUI();
    }

    function cycleRepeat() {
      const modes = album.tracks.length === 1 ? ["off","song"] : ["off","song","album"];
      repeatMode = modes[(modes.indexOf(repeatMode) + 1) % modes.length];
      const m = {
        off:   { l:"↺ Repeat: Off",   p:"false" },
        song:  { l:"↺ Repeat: Song",  p:"true"  },
        album: { l:"↺ Repeat: Album", p:"true"  }
      };
      repeatBtn.textContent = m[repeatMode].l; repeatBtn.dataset.mode = repeatMode;
      repeatBtn.setAttribute("aria-label", m[repeatMode].l + ". Press to cycle.");
      repeatBtn.setAttribute("aria-pressed", m[repeatMode].p);
    }

    /* ════════════════════════════════════════════════════════════
       AUDIO EVENTS
    ════════════════════════════════════════════════════════════ */
    audio.addEventListener("ended", () => {
      if (repeatMode === "song") { audio.currentTime = 0; audio.play().catch(() => {}); return; }
      playNext();
    });
    audio.addEventListener("playing", () => {
      bufFill.classList.remove("loading"); bufFill.style.background = ""; setPlayState(true);
    });
    audio.addEventListener("waiting", () => {
      bufFill.classList.add("loading"); bufFill.style.background = "var(--yellow)";
    });
    audio.addEventListener("pause", () => {
      artWrap.classList.remove("is-playing"); liveDot.classList.remove("active"); updateTrackUI();
    });
    audio.addEventListener("play",  () => updateTrackUI());
    audio.addEventListener("error", () => {
      isLoaded = false;
      playBtn.classList.remove("is-loading-text", "is-armed", "is-loading");
      playBtn.textContent = "▶ Play";
      showErr("// TRANSMISSION FAILURE — CHECK CONNECTION");
    });

    /* Stall recovery */
    let stallTimer;
    audio.addEventListener("stalled", () => {
      clearTimeout(stallTimer);
      stallTimer = setTimeout(() => { if (!audio.paused) audio.play().catch(() => {}); }, 1200);
    });
    audio.addEventListener("progress", () => clearTimeout(stallTimer));
    audio.addEventListener("playing",  () => clearTimeout(stallTimer));

    /* ════════════════════════════════════════════════════════════
       PROGRESS BAR
    ════════════════════════════════════════════════════════════ */
    const fmt = s => !Number.isFinite(s) || s < 0
      ? "0:00"
      : Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");

    audio.addEventListener("loadedmetadata", () => {
      durTimeEl.textContent = fmt(audio.duration);
      progBar.setAttribute("aria-valuemax", Math.floor(audio.duration));
      const d = trackList.querySelectorAll(".track-dur");
      if (d[currentIndex]) d[currentIndex].textContent = fmt(audio.duration);
    });
    audio.addEventListener("timeupdate", () => {
      if (isSeeking || !Number.isFinite(audio.duration) || !audio.duration) return;
      progBar.value = (audio.currentTime / audio.duration) * 100;
      progBar.setAttribute("aria-valuenow",  Math.floor(audio.currentTime));
      progBar.setAttribute("aria-valuetext", fmt(audio.currentTime) + " of " + fmt(audio.duration));
      curTimeEl.textContent = fmt(audio.currentTime);
      updateMediaPosition();
    });
    audio.addEventListener("progress", () => {
      if (!audio.duration || !audio.buffered.length) return;
      bufFill.style.width = (audio.buffered.end(audio.buffered.length - 1) / audio.duration) * 100 + "%";
    });
    progBar.addEventListener("mousedown",  () => isSeeking = true);
    progBar.addEventListener("touchstart", () => isSeeking = true, { passive: true });
    progBar.addEventListener("input", () => {
      if (audio.duration) {
        const t = (progBar.value / 100) * audio.duration;
        curTimeEl.textContent = fmt(t);
        progBar.setAttribute("aria-valuetext", fmt(t) + " of " + fmt(audio.duration));
      }
    });
    progBar.addEventListener("change", () => {
      if (audio.duration) audio.currentTime = (progBar.value / 100) * audio.duration;
      isSeeking = false;
    });
    progBar.addEventListener("mouseup",  () => isSeeking = false);
    progBar.addEventListener("touchend", () => isSeeking = false);

    /* Volume */
    volBar.addEventListener("input", () => {
      audio.volume = volBar.value / 100;
      volPctEl.textContent = volBar.value + "%";
    });

    /* ════════════════════════════════════════════════════════════
       MEDIA SESSION — lock screen + hardware keys
    ════════════════════════════════════════════════════════════ */
    function updateMediaSession(tr) {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: tr.title, artist: album.artist, album: album.title,
        artwork: [{ src: album.artworkUrl, sizes: "512x512", type: "image/png" }]
      });
      const h = {
        play:          async () => { await togglePlay(); },
        pause:         () => { audio.pause(); setPlayState(false); dropWake(); },
        previoustrack: playPrev,
        nexttrack:     playNext,
        seekbackward:  e => { audio.currentTime = Math.max(0, audio.currentTime - (e.seekOffset || 10)); },
        seekforward:   e => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + (e.seekOffset || 10)); },
        seekto:        e => { if (e.fastSeek && "fastSeek" in audio) audio.fastSeek(e.seekTime); else audio.currentTime = e.seekTime; }
      };
      for (const [a, fn] of Object.entries(h)) { try { navigator.mediaSession.setActionHandler(a, fn); } catch (_) {} }
    }
    function setMediaPlayState(s) { if ("mediaSession" in navigator) navigator.mediaSession.playbackState = s; }
    function updateMediaPosition() {
      if (!("mediaSession" in navigator) || !Number.isFinite(audio.duration)) return;
      try { navigator.mediaSession.setPositionState({ duration: audio.duration, playbackRate: audio.playbackRate, position: audio.currentTime }); } catch (_) {}
    }

    /* ════════════════════════════════════════════════════════════
       KEYBOARD
    ════════════════════════════════════════════════════════════ */
    document.addEventListener("keydown", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      switch (e.key) {
        case " ": case "MediaPlayPause": e.preventDefault(); togglePlay(); break;
        case "ArrowRight": e.preventDefault(); audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); break;
        case "ArrowLeft":  e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 10); break;
        case "ArrowUp":    e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.05); volBar.value = Math.round(audio.volume * 100); volPctEl.textContent = volBar.value + "%"; break;
        case "ArrowDown":  e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.05); volBar.value = Math.round(audio.volume * 100); volPctEl.textContent = volBar.value + "%"; break;
        case "n": case "N": case "MediaTrackNext":     playNext(); break;
        case "p": case "P": case "MediaTrackPrevious": playPrev(); break;
        case "r": case "R": cycleRepeat(); break;
        case "m": case "M": audio.muted = !audio.muted; break;
      }
    });

    /* ════════════════════════════════════════════════════════════
       TRACK LIST
    ════════════════════════════════════════════════════════════ */
    function updateTrackUI() {
      trackList.querySelectorAll(".track-btn").forEach((btn, i) => {
        const cur = i === currentIndex && isLoaded;
        btn.setAttribute("aria-current", cur ? "true" : "false");
        btn.classList.toggle("is-playing", cur && !audio.paused);
        if (cur) btn.setAttribute("aria-label",
          "Track " + (i + 1) + ": " + album.tracks[i].title + " — " + (audio.paused ? "paused" : "now playing"));
      });
    }

    function renderTracks() {
      trackList.innerHTML = "";
      const countEl = document.getElementById("trackCount");
      if (countEl) countEl.textContent = album.tracks.length + " Target" + (album.tracks.length !== 1 ? "s" : "");

      album.tracks.forEach((tr, i) => {
        const li = document.createElement("li"), btn = document.createElement("button");
        btn.className = "track-btn"; btn.type = "button";
        btn.setAttribute("aria-current", "false");
        btn.setAttribute("aria-label", "Track " + (i + 1) + ": " + tr.title + " by " + album.artist);
        btn.innerHTML =
          '<span class="track-num" aria-hidden="true">' + String(i + 1).padStart(2, "0") + '</span>' +
          '<span class="track-info-col"><span class="track-title-text">' + tr.title + '</span>' +
          '<span class="track-meta-text">' + album.artist + '</span></span>' +
          '<span class="track-dur" aria-label="Duration: ' + tr.duration + '">' + tr.duration + '</span>';
        btn.addEventListener("click", () => { loadTrack(i); showLoadingState(); });
        li.appendChild(btn); trackList.appendChild(li);
      });

      /* Remix row */
      const ACCEPTED_EXTS = ["m4a", "flac"];
      const rl = document.createElement("li");
      rl.innerHTML =
        '<div class="remix-row" role="button" tabindex="0" aria-label="Submit a remix">' +
        '<input class="remix-file-input" type="file" accept=".m4a,.flac,audio/mp4,audio/flac,audio/x-flac" id="remixFileInput"/>' +
        '<div class="remix-icon-cell" aria-hidden="true"><img src="' + ICON_DARK + '" alt=""/></div>' +
        '<div class="remix-info"><span class="remix-title">Submit a Remix</span><span class="remix-sub">Upload m4a or flac</span></div>' +
        '<div class="remix-cta" aria-live="polite" id="remixCta">+ Add</div></div>';
      trackList.appendChild(rl);

      const toast = document.createElement("p");
      toast.className = "upload-toast"; toast.setAttribute("aria-live", "polite");
      trackList.parentElement.appendChild(toast);

      document.getElementById("remixFileInput").addEventListener("change", function () {
        const file = this.files[0]; if (!file) return;
        const cta = document.getElementById("remixCta");
        const ext = file.name.split(".").pop().toLowerCase();
        if (!ACCEPTED_EXTS.includes(ext)) {
          cta.textContent = "REJECTED";
          toast.textContent = "// Only .m4a and .flac accepted.";
          toast.classList.add("show"); return;
        }
        cta.textContent = "✓ RECEIVED";
        toast.textContent = "// RECEIVED: " + file.name + " (" + (file.size / 1024 / 1024).toFixed(2) + " MB)";
        toast.classList.add("show");
        console.log("[Remix]", file.name, file.size, "bytes");
      });

      if (album.tracks.length === 1) { prevBtn.style.display = "none"; nextBtn.style.display = "none"; }
    }

    /* ════════════════════════════════════════════════════════════
       HELPERS
    ════════════════════════════════════════════════════════════ */
    function showErr(m) { errLine.textContent = m; errLine.classList.add("show"); }
    function clearErr()  { errLine.textContent = ""; errLine.classList.remove("show"); }

    playBtn.addEventListener("click",   togglePlay);
    prevBtn.addEventListener("click",   playPrev);
    nextBtn.addEventListener("click",   playNext);
    repeatBtn.addEventListener("click", cycleRepeat);

    /* ════════════════════════════════════════════════════════════
       INIT
    ════════════════════════════════════════════════════════════ */
    function init() {
      document.getElementById("albumArtImg").src = ALBUM_ART_URL;
      const dlBtn = document.getElementById("downloadFlac");
      if (dlBtn) dlBtn.href = album.tracks[0].flac;
      renderTracks();
      updateMediaSession(album.tracks[0]);
      setPlayState(false);
    }

    init();
  </script>
</body>
</html>
