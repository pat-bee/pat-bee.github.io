<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!--
  ╔══════════════════════════════════════════════════════════════════════════╗
  ║  index_album  ·  Model 1                                                ║
  ║  Song:    BroBot                                                         ║
  ║  Artist:  Pat Bɇɇ                                                       ║
  ║  Album:   BroBot  (single release)                                       ║
  ║                                                                          ║
  ║  SITE HIERARCHY                                                          ║
  ║  pat-bee.github.io/album/brobot/index.html                              ║
  ║                                                                          ║
  ║  CDN FILE NAMES (explicit — not derived from slug)                      ║
  ║  pat-bee_brobot-cover.jpg    album art                                  ║
  ║  pat-bee_brobot.flac         lossless audio                             ║
  ║  pat-bee_brobot.m4a          AAC fallback                               ║
  ║  /remixes/brobot/            remix submissions land here                ║
  ║                                                                          ║
  ╠══════════════════════════════════════════════════════════════════════════╣
  ║                                                                          ║
  ║  SONG_CONFIG — SINGLE SOURCE OF TRUTH                                   ║
  ║  All repeating values (song name, artist, album, CDN paths, artist      ║
  ║  link, page URL, remix endpoint) are defined once in SONG_CONFIG.       ║
  ║  A future CMS/generator replaces these values per release.              ║
  ║                                                                          ║
  ║  Fields a generator must inject:                                        ║
  ║    title  · artist  · album  · slug                                     ║
  ║    cdnBase  · pageUrl  · artistUrl  · artistLabel                       ║
  ║    albumUrl (song pages: "../" — album index pages: "")                 ║
  ║    remixEndpoint (empty = client-side only)                             ║
  ║                                                                          ║
  ╠══════════════════════════════════════════════════════════════════════════╣
  ║                                                                          ║
  ║  REMIX UPLOAD — accepted types (client + server both validate):         ║
  ║    .m4a  audio/mp4                                                      ║
  ║    .flac  audio/flac  audio/x-flac                                      ║
  ║    .wav   audio/wav   audio/x-wav                                       ║
  ║    .mp3   audio/mpeg                                                    ║
  ║  Cloudflare Worker writes to: /remixes/{slug}/{filename} in R2          ║
  ║                                                                          ║
  ╠══════════════════════════════════════════════════════════════════════════╣
  ║                                                                          ║
  ║  ARTIST LINK TRACKING                                                   ║
  ║  Both eyebrow and footer use SONG_CONFIG.artistUrl as the base.         ║
  ║  buildArtistUrl("header") appends utm_source=header                     ║
  ║  buildArtistUrl("footer") appends utm_source=footer                     ║
  ║  Outbound clicks to each placement are separately measurable.           ║
  ║                                                                          ║
  ╚══════════════════════════════════════════════════════════════════════════╝

  BREAKBREAK: everything in this <head> except charset/viewport metas
  should move to a server-side partial: partials/head.html
  OG tag values are injected from SONG_CONFIG at build time.
  -->

  <title>BroBot — Pat Bɇɇ</title>

  <meta property="og:type"         content="music.song" />
  <meta property="og:site_name"    content="Pat Bɇɇ" />

  <meta property="og:url"          content="https://pat-bee.github.io/album/brobot/" />
  <meta property="og:image"        content="https://pub-8ca7a487f9234c669dfad0530698bfe0.r2.dev/pat-bee_brobot-cover.jpg" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="1200" />

  <meta name="twitter:card"        content="summary_large_image" />

  <meta name="twitter:description" content="Listen to BroBot by Pat Bɇɇ" />
  <meta name="twitter:image"       content="https://pub-8ca7a487f9234c669dfad0530698bfe0.r2.dev/pat-bee_brobot-cover.jpg" />

  <link rel="preconnect" href="https://pub-8ca7a487f9234c669dfad0530698bfe0.r2.dev" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <!--
    Russo One  — Display/title font. All headings, track names, play button.
    Exo 2      — UI chrome. Labels, times, badges, status, all body copy.
    BREAKBREAK: font imports → partials/head.html
  -->
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />

  <!-- BREAKBREAK: this entire <style> block → styles/brobot.css -->
  <style>
    /* ═══════════════════════════════════════════════════════════
       SHOCKWAVE / DECEPTICON DESIGN SYSTEM
       ─────────────────────────────────────────────────────────
       Three-color palette:
         1. DARK PURPLE      — dominant, backgrounds, panels
         2. CRYSTAL PURPLE   — translucent 80s plastic accent
         3. COPPER           — 9V battery touch (very sparse)
       Plus chrome/silver for mechanical details.
    ═══════════════════════════════════════════════════════════ */
    :root {
      /* Dark purple grounds */
      --bg:            #0a0515;
      --bg-panel:      #120a22;
      --bg-raised:     #1c1035;
      --bg-inset:      #080312;

      /* Purple spectrum */
      --purple-deep:   #2a0e55;
      --purple-mid:    #4a1a88;
      --purple-bright: #6622bb;

      /* CRYSTAL — translucent 80s plastic purple accent */
      --crystal:       #b87aff;
      --crystal-glow:  rgba(184,122,255,0.35);
      --crystal-faint: rgba(184,122,255,0.12);
      --crystal-dim:   rgba(184,122,255,0.5);

      /* COPPER — 9V battery accent. Use sparingly. */
      --copper:        #c8883a;
      --copper-bright: #e0a050;
      --copper-faint:  rgba(200,136,58,0.18);

      /* Chrome — mechanical gray details */
      --chrome:        #7a7a96;
      --chrome-bright: #b0b0c8;
      --chrome-faint:  rgba(122,122,150,0.2);

      /* Text — purple-tinted whites */
      --text:          #e0d0f8;
      --text-mid:      #9888b8;
      --text-dim:      #584870;
      --text-faint:    rgba(224,208,248,0.2);

      /* Borders */
      --border:        rgba(102,34,187,0.4);
      --border-chrome: rgba(176,176,200,0.2);
      --border-strong: rgba(184,122,255,0.3);

      /* Glows */
      --glow-purple:   0 0 24px rgba(102,34,187,0.5);
      --glow-crystal:  0 0 18px rgba(184,122,255,0.4);

      /* Focus ring — ADA */
      --focus-ring:    #b87aff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .skip-link {
      position: absolute; top: -100%; left: 12px; z-index: 10000;
      background: var(--crystal); color: #0a0515;
      padding: 8px 16px; font-family: 'Exo 2', sans-serif;
      font-size: 0.8rem; font-weight: 600; text-decoration: none;
      letter-spacing: 0.08em; transition: top 200ms;
    }
    .skip-link:focus { top: 0; }
    :focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 3px; }

    html {
      background: var(--bg); color: var(--text);
      font-family: 'Exo 2', sans-serif; font-weight: 300;
      min-height: 100%; -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh; background: var(--bg);
      position: relative; overflow-x: hidden;
    }

    /* ── BACKGROUND: HEXAGONAL DECEPTICON GRID ──────────────── */
    body::before {
      content: ""; position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(60deg,  rgba(102,34,187,0.08) 1px, transparent 1px),
        linear-gradient(120deg, rgba(102,34,187,0.08) 1px, transparent 1px),
        linear-gradient(0deg,   rgba(102,34,187,0.05) 1px, transparent 1px);
      background-size: 56px 56px, 56px 56px, 56px 56px;
    }

    /* Vignette */
    body::after {
      content: ""; position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 50% 40%, transparent 20%, rgba(8,3,18,0.7) 100%);
    }

    button { font-family: 'Exo 2', sans-serif; color: inherit; cursor: pointer; }

    .page-shell {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 20px 60px;
    }
    .inner { width: 100%; max-width: 880px; }

    /* ═══════════════════════════════════════════════════════════
       MASTHEAD
       ─────────────────────────────────────────────────────────
       Eyebrow line: album up-link · artist link
       (both rendered from SONG_CONFIG by initMasthead)
       Song title in h1. No separate artist element below title.
       BREAKBREAK: masthead HTML → partials/masthead.html
    ═══════════════════════════════════════════════════════════ */
    .masthead {
      container-type: inline-size;
      position: relative; padding: 24px 28px 20px;
      background: linear-gradient(170deg, #2a1050 0%, #180838 40%, #0d0520 100%);
      border: 1px solid var(--border-strong);
      border-bottom: 3px solid var(--purple-bright);
      overflow: hidden;
    }
    /* Shiny plastic highlight strip */
    .masthead::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,
        transparent 0%, var(--crystal-dim) 30%,
        rgba(255,255,255,0.6) 50%, var(--crystal-dim) 70%, transparent 100%);
    }
    /* Diagonal slash accent */
    .masthead::after {
      content: ""; position: absolute; right: -30px; top: -30px;
      width: 120px; height: 120px;
      background: var(--purple-bright); opacity: 0.15;
      transform: rotate(45deg); pointer-events: none;
    }

    /* Eyebrow — album link · artist link */
    .masthead-label {
      position: relative; z-index: 1;
      font-size: 0.58rem; letter-spacing: 0.38em;
      text-transform: uppercase; color: var(--crystal-dim);
      margin-bottom: 6px; font-weight: 400;
    }
    /* Links inside eyebrow — album up-link and artist link */
    .masthead-label a {
      color: var(--crystal-dim); text-decoration: none;
      transition: color 160ms, text-shadow 160ms;
    }
    .masthead-label a:hover {
      color: var(--crystal);
      text-shadow: 0 0 10px var(--crystal-glow);
    }

    /*
    Russo One title — no forced text-transform uppercase needed,
    Russo One renders in caps naturally.
    To change display font globally: replace 'Russo One' here AND in
    .np-title, .track-title-text, .album-label-name, .play-btn, .remix-title
    */
    .masthead-title {
      position: relative; z-index: 1;
      font-family: 'Russo One', sans-serif;
      font-size: clamp(0.5rem, 18cqi, 5.8rem);
      white-space: nowrap; overflow: hidden;
      line-height: 1.05;   /* 1.05 prevents descender clipping */
      padding-bottom: 0.06em;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text);
      text-shadow:
        0 0 40px rgba(184,122,255,0.3),
        0 0 80px rgba(102,34,187,0.2),
        2px 4px 0 rgba(0,0,0,0.8);
    }

    /* ── SHARE STRIP ─────────────────────────────────────────────────────────
       Placed above the footer artist link (not in masthead).
       Wired by initShareStrip() from SONG_CONFIG.
       Unsupported buttons hidden by JS so layout never shifts.
       BREAKBREAK: components/share-strip.js + share-strip.css
    ──────────────────────────────────────────────────────────────────────── */
    .share-strip {
      display: flex; justify-content: center; align-items: center;
      gap: 18px; margin: 18px 0 10px;
    }
    .share-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-mid); cursor: pointer; border-radius: 2px;
      transition: border-color 140ms, color 140ms, background 140ms, box-shadow 140ms;
      padding: 0; position: relative;
    }
    .share-btn:hover {
      border-color: var(--crystal-dim); color: var(--crystal);
      background: var(--crystal-faint);
      box-shadow: 0 0 10px var(--crystal-faint);
    }
    .share-btn:active { transform: scale(0.94); }
    .share-btn svg {
      width: 14px; height: 14px; fill: none; stroke: currentColor;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    .share-btn.copied::after {
      content: "Copied"; position: absolute; bottom: -20px;
      left: 50%; transform: translateX(-50%);
      font-family: 'Exo 2', sans-serif; font-size: 0.44rem;
      letter-spacing: 0.1em; color: var(--crystal);
      white-space: nowrap; pointer-events: none;
    }
    .share-btn.hidden { display: none; }

    /* ── COPPER RULE ────────────────────────────────────────── */
    .copper-rule {
      width: 100%; height: 1px;
      background: linear-gradient(90deg,
        transparent, var(--copper) 20%, var(--copper-bright) 50%,
        var(--copper) 80%, transparent);
      opacity: 0.6;
    }

    /* ═══════════════════════════════════════════════════════════
       MAIN GRID
    ═══════════════════════════════════════════════════════════ */
    .main-grid {
      display: grid; grid-template-columns: minmax(220px, 350px) 1fr;
      border: 1px solid var(--border); border-top: none;
      background: var(--bg-panel);
    }

    /* col-art: no padding — art-wrap fills 100% of column.
       aspect-ratio: 1/1 + object-fit: cover handles non-square images.
       BREAKBREAK: img src set from SONG_CONFIG.artworkUrl in init().  */
    .col-art { border-right: 1px solid var(--border); }
    .col-player { padding: 22px; display: flex; flex-direction: column; gap: 14px; min-width: 0; }

    /* ═══════════════════════════════════════════════════════════
       ALBUM ART — shiny plastic frame, full-column width
    ═══════════════════════════════════════════════════════════ */
    .art-wrap {
      position: relative; width: 100%; aspect-ratio: 1 / 1;
      border: none; overflow: hidden; background: var(--bg-inset);
      display: block; transition: box-shadow 800ms;
      box-shadow: var(--glow-purple), inset 0 0 40px rgba(0,0,0,0.6);
    }
    .art-wrap.is-playing {
      box-shadow:
        0 0 32px rgba(184,122,255,0.25),
        0 0 60px rgba(102,34,187,0.15),
        inset 0 0 40px rgba(0,0,0,0.6);
    }

    /* Shiny gloss overlay */
    .art-wrap::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 45%;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 60%, transparent 100%);
      z-index: 4; pointer-events: none;
    }

    /* Crystal corner glare */
    .art-wrap::after {
      content: ""; position: absolute; top: 0; right: 0;
      width: 60px; height: 60px;
      background: radial-gradient(circle at top right, rgba(184,122,255,0.18) 0%, transparent 70%);
      z-index: 4; pointer-events: none;
    }

    .art-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block; position: relative; z-index: 2;
      transition: filter 800ms, opacity 180ms ease;
    }
    .art-wrap.is-playing img { animation: art-pulse 4s ease-in-out infinite alternate; }
    @keyframes art-pulse {
      from { filter: saturate(1) brightness(0.95); }
      to   { filter: saturate(1.12) brightness(1.05); }
    }

    /* EQ bars */
    .eq-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 32%; display: flex; align-items: flex-end;
      gap: 3px; padding: 0 12%;
      opacity: 0; transition: opacity 400ms; z-index: 5;
    }
    .art-wrap.is-playing .eq-overlay { opacity: 1; }
    .eq-b {
      flex: 1;
      background: linear-gradient(0deg, var(--purple-bright), var(--crystal));
      border-radius: 1px 1px 0 0; min-height: 3px;
      animation: eq-wave 0.44s ease infinite alternate; opacity: 0.8;
    }
    .eq-b:nth-child(1){animation-delay:0.00s}.eq-b:nth-child(2){animation-delay:0.08s}
    .eq-b:nth-child(3){animation-delay:0.16s}.eq-b:nth-child(4){animation-delay:0.04s}
    .eq-b:nth-child(5){animation-delay:0.12s}.eq-b:nth-child(6){animation-delay:0.20s}
    .eq-b:nth-child(7){animation-delay:0.06s}.eq-b:nth-child(8){animation-delay:0.14s}
    @keyframes eq-wave { from { height: 5%; } to { height: 85%; } }

    /* ═══════════════════════════════════════════════════════════
       NOW PLAYING
    ═══════════════════════════════════════════════════════════ */
    .np-label {
      font-size: 0.56rem; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px;
    }
    .np-title {
      font-family: 'Russo One', sans-serif;
      font-size: 1.35rem; line-height: 1.05;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text); word-break: break-word;
      text-shadow: 0 0 20px rgba(184,122,255,0.25);
    }
    .np-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }

    .live-dot {
      display: inline-block; width: 9px; height: 9px; border-radius: 50%;
      background: var(--text-faint); border: 1px solid var(--border);
      flex-shrink: 0; transition: all 200ms;
    }
    .live-dot.active {
      background: var(--crystal); border-color: var(--crystal);
      box-shadow: 0 0 10px var(--crystal-glow), 0 0 20px var(--crystal-faint);
      animation: dot-pulse 1s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--crystal-glow); }
      50%       { opacity: 0.4; box-shadow: 0 0 4px var(--crystal-faint); }
    }

    .badge {
      font-size: 0.56rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 8px; border: 1px solid var(--border);
      color: var(--text-mid); background: transparent; border-radius: 2px; font-weight: 400;
    }
    .badge-flac  { border-color: var(--crystal-dim); color: var(--crystal); }
    .badge-wake.active { border-color: var(--chrome); color: var(--chrome-bright); }

    /* ── BUFFER BAR ─────────────────────────────────────────── */
    .buf-wrap { width: 100%; height: 2px; background: var(--text-faint); }
    .buf-fill { height: 100%; background: var(--purple-mid); width: 0%; transition: width 500ms ease; }
    .buf-fill.loading { animation: buf-pulse 1s ease-in-out infinite; }
    @keyframes buf-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ── PROGRESS BAR ───────────────────────────────────────── */
    .prog-row {
      display: grid; grid-template-columns: 46px 1fr 46px;
      gap: 8px; align-items: center;
      font-size: 0.66rem; color: var(--text-mid);
      font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
    }
    .prog-bar {
      appearance: none; width: 100%; height: 8px;
      background: linear-gradient(90deg, var(--purple-deep) 0%, var(--purple-mid) 100%);
      border: 1px solid var(--border); border-radius: 0; cursor: pointer;
    }
    .prog-bar::-webkit-slider-thumb {
      appearance: none; width: 14px; height: 22px;
      background: linear-gradient(180deg, var(--crystal) 0%, var(--purple-bright) 100%);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 8px var(--crystal-glow);
      border-radius: 2px; cursor: pointer;
    }
    .prog-bar::-moz-range-thumb {
      width: 14px; height: 22px;
      background: linear-gradient(180deg, var(--crystal) 0%, var(--purple-bright) 100%);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 8px var(--crystal-glow);
      border-radius: 2px; cursor: pointer;
    }

    /* ── VOLUME ─────────────────────────────────────────────── */
    .vol-row { display: flex; align-items: center; gap: 10px; }
    .vol-label {
      font-size: 0.56rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-dim); min-width: 44px;
    }
    .vol-bar {
      appearance: none; flex: 1; height: 5px;
      background: var(--purple-deep); border: 1px solid var(--border);
      border-radius: 0; cursor: pointer;
    }
    .vol-bar::-webkit-slider-thumb {
      appearance: none; width: 11px; height: 17px;
      background: var(--chrome-bright); border-radius: 1px; cursor: pointer;
    }
    .vol-bar::-moz-range-thumb {
      width: 11px; height: 17px;
      background: var(--chrome-bright); border-radius: 1px; cursor: pointer;
    }
    .vol-pct {
      font-size: 0.6rem; color: var(--text-dim);
      font-variant-numeric: tabular-nums; min-width: 34px; text-align: right;
    }

    /* ═══════════════════════════════════════════════════════════
       CONTROLS — PLAY BUTTON DOMINANT
    ═══════════════════════════════════════════════════════════ */
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .ctrl-btn {
      border: 1px solid var(--border); background: var(--bg-raised);
      color: var(--text-mid); font-family: 'Exo 2', sans-serif;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0 14px; min-height: 40px;
      border-radius: 2px; box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
      transition: background 120ms, border-color 120ms, color 120ms, box-shadow 100ms, transform 80ms;
      position: relative; overflow: hidden;
    }
    .ctrl-btn:hover {
      background: var(--purple-deep); border-color: var(--border-strong); color: var(--text);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.5), 0 0 12px var(--crystal-faint);
    }
    .ctrl-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(0,0,0,0.5); }

    /* Play button — crystal translucent plastic */
    .play-btn {
      min-width: 140px; min-height: 56px;
      font-family: 'Russo One', sans-serif; font-size: 1.05rem; letter-spacing: 0.1em;
      background: linear-gradient(160deg, #9944ee 0%, var(--purple-bright) 40%, #4a1a88 100%);
      color: #ffffff; border: 1px solid var(--crystal-dim);
      box-shadow:
        0 0 20px rgba(102,34,187,0.5), 0 0 40px rgba(184,122,255,0.15),
        3px 4px 0 rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .play-btn:hover {
      background: linear-gradient(160deg, var(--crystal) 0%, #7733cc 40%, var(--purple-bright) 100%);
      box-shadow:
        0 0 28px rgba(184,122,255,0.5), 0 0 60px rgba(184,122,255,0.2),
        3px 4px 0 rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
      color: #fff;
    }
    .play-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(0,0,0,0.5), 0 0 10px rgba(184,122,255,0.3); }
    .play-btn.is-loading { background: var(--purple-deep); border-color: var(--border); cursor: wait; }
    .play-btn.is-loading::after {
      content: ""; position: absolute; top:50%; left:50%;
      width: 18px; height: 18px;
      border: 2px solid rgba(184,122,255,0.3); border-top-color: var(--crystal);
      border-radius: 50%; transform: translate(-50%,-50%);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .repeat-btn { min-width: 136px; font-size: 0.64rem; }
    .repeat-btn[data-mode="song"]  { border-color: var(--crystal-dim); color: var(--crystal); }
    .repeat-btn[data-mode="album"] { border-color: var(--chrome); color: var(--chrome-bright); }

    .kbd-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .kbd-hint { font-size: 0.54rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    kbd {
      display: inline-block; padding: 0 4px; border: 1px solid var(--border);
      font-size: 0.54rem; font-family: inherit; color: var(--text-mid);
      background: var(--bg-inset); border-radius: 2px;
    }

    .status-line { font-size: 0.58rem; color: var(--text-dim); line-height: 1.5; letter-spacing: 0.04em; }
    .err-line { font-size: 0.64rem; color: var(--crystal); display: none; line-height: 1.4; font-weight: 600; }
    .err-line.show { display: block; }

    /* ═══════════════════════════════════════════════════════════
       PLAYLIST
       BREAKBREAK: track renderer → components/track-list.js
    ═══════════════════════════════════════════════════════════ */
    .playlist-section { border: 1px solid var(--border); border-top: none; background: var(--bg-panel); }
    .playlist-header {
      padding: 9px 22px; border-bottom: 1px solid var(--border);
      font-size: 0.56rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
      display: flex; justify-content: space-between;
    }

    .track-list { list-style: none; }
    .track-btn, .remix-row {
      width: 100%; display: grid; grid-template-columns: 56px 1fr auto;
      align-items: stretch; text-align: left;
      border: none; border-bottom: 1px solid var(--border); transition: background 120ms;
    }
    .track-list li:last-child .track-btn,
    .track-list li:last-child .remix-row { border-bottom: none; }

    .track-btn { background: transparent; cursor: pointer; }
    .track-btn:hover { background: var(--crystal-faint); }
    .track-btn[aria-current="true"] { background: var(--crystal-faint); box-shadow: inset 3px 0 0 var(--crystal); }
    .track-btn[aria-current="true"] .track-num {
      color: var(--crystal); text-shadow: 0 0 10px var(--crystal-glow);
    }
    .track-btn[aria-current="true"].is-playing .track-num {
      animation: num-blink 1.1s ease-in-out infinite;
    }
    @keyframes num-blink {
      0%, 100% { color: var(--crystal); text-shadow: 0 0 10px var(--crystal-glow); }
      50%       { color: var(--text-dim); text-shadow: none; }
    }

    .track-num {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 0; border-right: 1px solid var(--border);
      font-family: 'Russo One', sans-serif; font-size: 1rem;
      color: var(--text-dim); min-width: 56px;
    }
    .track-info-col { padding: 14px 18px; display: flex; flex-direction: column; justify-content: center; gap: 4px; min-width: 0; }
    .track-title-text {
      font-family: 'Russo One', sans-serif; font-size: 0.85rem;
      letter-spacing: 0.05em; text-transform: uppercase; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-meta-text { font-size: 0.56rem; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .track-dur {
      display: flex; align-items: center; padding: 14px 16px;
      font-size: 0.68rem; color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      border-left: 1px solid var(--border); white-space: nowrap;
    }

    /* ═══════════════════════════════════════════════════════════
       REMIX ROW — copper accent
       Accepts: .m4a  .flac  .wav  .mp3
       Destination: /remixes/{slug}/{filename}
       BREAKBREAK: components/remix-uploader.js
    ═══════════════════════════════════════════════════════════ */
    .remix-row {
      background: var(--copper-faint); border-top: 1px dashed rgba(200,136,58,0.4);
      cursor: pointer; position: relative;
    }
    .remix-row:hover { background: rgba(200,136,58,0.1); }
    .remix-row:focus-within { outline: 3px solid var(--focus-ring); outline-offset: -3px; }
    .remix-file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
    .remix-icon-cell {
      display: flex; align-items: center; justify-content: center;
      padding: 12px 0; border-right: 1px dashed rgba(200,136,58,0.4); min-width: 56px;
    }
    .remix-icon-cell img { width: 28px; height: 28px; object-fit: contain; opacity: 0.6; }
    .remix-info { padding: 13px 18px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
    .remix-title {
      font-family: 'Russo One', sans-serif; font-size: 0.78rem;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--copper);
    }
    .remix-sub { font-size: 0.56rem; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .remix-cta {
      display: flex; align-items: center; padding: 13px 16px;
      font-size: 0.6rem; color: var(--copper-bright);
      border-left: 1px dashed rgba(200,136,58,0.4);
      white-space: nowrap; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .upload-toast {
      display: none; padding: 10px 22px; font-size: 0.6rem; color: var(--copper);
      letter-spacing: 0.06em; background: var(--copper-faint);
      border-top: 1px solid var(--border);
    }
    .upload-toast.show { display: block; }

    /* ── FOOTER ──────────────────────────────────────────────────────────────
       Artist link: utm_source=footer for separate click tracking.
       BREAKBREAK: partials/footer.html — href injected from SONG_CONFIG.
    ──────────────────────────────────────────────────────────────────────── */
    .page-footer { margin-top: 22px; text-align: center; width: 100%; }
    .page-footer a {
      font-family: 'Exo 2', sans-serif; font-size: 0.68rem;
      letter-spacing: 0.24em; text-transform: uppercase; color: var(--text-dim);
      text-decoration: none; border-bottom: 1px solid var(--text-faint);
      padding-bottom: 2px; transition: color 180ms, border-color 180ms;
    }
    .page-footer a:hover { color: var(--crystal); border-color: var(--crystal-dim); }

    /* ── MOBILE — stacked single-column layout ─────────────────────────── */
    @media (max-width: 640px) {
      .page-shell { padding: 16px 12px 44px; }
      .main-grid { grid-template-columns: 1fr; }
      .col-art { border-right: none; border-bottom: 1px solid var(--border); }
      .col-player { padding: 16px; }
      /* art-wrap fills full mobile column width — edge to edge */
      .kbd-row { display: none; }
      .track-btn, .remix-row { grid-template-columns: 44px 1fr auto; }
      .track-num, .remix-icon-cell { min-width: 44px; }
    }

    audio { position: fixed; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>
  <!-- END BREAKBREAK: styles/brobot.css -->
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main class="page-shell" id="main-content">
    <div class="inner">

        <!-- LEFT — art-wrap fills 100% column width, no padding.

       File paths are set directly in the album.tracks array below.

      title:         "BroBot",
      artist:        "Pat Bɇɇ",

      slug:          "brobot",

      /* CDN root — no trailing slash */
      cdnBase:       "https://pub-8ca7a487f9234c669dfad0530698bfe0.r2.dev",

        + "&utm_medium=songpage"

    function upgradeToFullBlob() {
      if (!audio._fullBlobUrl) return false;
      const t = audio.currentTime, w = !audio.paused;
      if (audio._blobUrl) URL.revokeObjectURL(audio._blobUrl);
      audio._blobUrl = audio._fullBlobUrl; delete audio._fullBlobUrl;
      audio.src = audio._blobUrl; audio.preload = "auto"; audio.load();
      audio.addEventListener("loadedmetadata", function s() {
        audio.removeEventListener("loadedmetadata", s);
        audio.currentTime = t; if (w) audio.play().catch(() => {});
      }, { once: true });
      return true;
    }

    async function loadAndPlayAsBlob(idx, ff = false) {
      const si = Math.max(0, Math.min(idx, album.tracks.length - 1)), tr = album.tracks[si], { src, isFlac } = getBestSrc(tr, ff);
      currentIndex = si; usedFallback = ff || !isFlac; isLoaded = true;
      npTitle.textContent = tr.title; updateFmtBadge(isFlac); clearErr(); updateTrackUI(); updateMediaSession(tr);
      const thr = calcThr(isFlac);
      if (thr === null) { loadTrack(idx, ff); try { await waitForPrebuffer(); await audio.play(); setPlayState(true); await acquireWake(); } catch (e) { showErr("Check connection and audio URLs"); } return; }
      const ctrl = new AbortController(), tout = setTimeout(() => ctrl.abort(), BLOB_TIMEOUT_MS);
      try {
        const res = await fetch(src, { signal: ctrl.signal, cache: "default" }); clearTimeout(tout);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const total = res.headers.get("content-length") ? parseInt(res.headers.get("content-length"), 10) : null;
        const mime = isFlac ? "audio/flac" : "audio/mp4", reader = res.body.getReader(), chunks = []; let received = 0, started = false;
        showDLP(0);
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          chunks.push(value); received += value.length; const pct = total ? received / total : 0;
          if (!started) {
            showDLP(total ? Math.round(pct * 100) : null);
            if (pct >= thr || (!total && received > 2000000)) {
              started = true;
              const blob = new Blob([...chunks], { type: mime }), url = URL.createObjectURL(blob);
              if (audio._blobUrl) URL.revokeObjectURL(audio._blobUrl);
              audio._blobUrl = url; audio.src = url; audio.preload = "auto"; audio.load();
              clearDLP(); await audio.play(); setPlayState(true); await acquireWake();
            }
          } else if (total) { bufFill.style.background = "var(--crystal)"; bufFill.style.width = Math.round(pct * 100) + "%"; }
        }
        const fb = new Blob(chunks, { type: mime }), fu = URL.createObjectURL(fb);
        if (!started) { if (audio._blobUrl) URL.revokeObjectURL(audio._blobUrl); audio._blobUrl = fu; audio.src = fu; audio.preload = "auto"; audio.load(); clearDLP(); await audio.play(); setPlayState(true); await acquireWake(); }
        else { audio._fullBlobUrl = fu; setTimeout(() => { bufFill.style.background = ""; bufFill.style.width = "0%"; }, 800); }
      } catch (err) {
        clearTimeout(tout); clearDLP();
        if (!usedFallback && !ff) { await loadAndPlayAsBlob(idx, true); return; }
        showErr("Streaming mode — blob unavailable"); setTimeout(() => clearErr(), 3500);
        loadTrack(idx, false); try { await audio.play(); setPlayState(true); await acquireWake(); } catch (e) { showErr("Playback failed — check CORS and audio URLs"); }
      }
    }

    function showDLP(pct) { if (pct === 0) bufFill.style.width = "0%"; playBtn.classList.remove("is-loading"); playBtn.textContent = pct === null ? "Buffering…" : pct === 0 ? "Loading…" : pct + "%"; playBtn.style.fontSize = "0.75rem"; playBtn.setAttribute("aria-label", "Loading…"); bufFill.style.width = pct ? pct + "%" : "0%"; bufFill.style.background = "var(--crystal)"; bufFill.classList.remove("loading"); }
    function clearDLP() { playBtn.classList.remove("is-loading"); playBtn.style.fontSize = ""; bufFill.style.background = ""; }

    /* Streaming fallback */
    function waitForPrebuffer() { return new Promise(resolve => { function check() { if (!audio.duration || !audio.buffered.length) { requestAnimationFrame(check); return; } const b = audio.buffered.end(audio.buffered.length - 1); if (b >= Math.min(MIN_PREBUFFER_SECONDS, audio.duration)) resolve(); else { bufFill.style.width = Math.round((b / audio.duration) * 100) + "%"; bufFill.style.background = "var(--crystal)"; requestAnimationFrame(check); } } check(); }); }
    setInterval(() => { if (USE_BLOB_LOADING) return; if (audio.paused || !audio.duration || !audio.buffered.length) return; const a = audio.buffered.end(audio.buffered.length - 1) - audio.currentTime; if (a < DANGER_SECONDS && !isRebuffering) { isRebuffering = true; audio.pause(); bufFill.classList.add("loading"); const p = setInterval(() => { if (!audio.buffered.length) return; const r = audio.buffered.end(audio.buffered.length - 1) - audio.currentTime; if (r >= DANGER_SECONDS * 3) { clearInterval(p); isRebuffering = false; bufFill.classList.remove("loading"); audio.play().catch(() => {}); } }, 500); } }, 2000);

    /* BREAKBREAK → components/track-list.js */
    function renderTracks() {
      trackList.innerHTML = "";
      const el = document.getElementById("trackCount");
      if (el) el.textContent = album.tracks.length + " Track" + (album.tracks.length !== 1 ? "s" : "");

      album.tracks.forEach((tr, i) => {
        const li = document.createElement("li"), btn = document.createElement("button");
        btn.className = "track-btn"; btn.type = "button";
        btn.setAttribute("aria-current", "false");
        btn.setAttribute("aria-label", "Track " + (i + 1) + ": " + tr.title + " by " + album.artist);
        btn.innerHTML = '<span class="track-num" aria-hidden="true">' + String(i + 1).padStart(2, "0") + '</span><span class="track-info-col"><span class="track-title-text">' + tr.title + '</span><span class="track-meta-text">' + album.artist + '</span></span><span class="track-dur" aria-label="Duration: ' + tr.duration + '">' + tr.duration + '</span>';
        btn.addEventListener("click", () => { if (USE_BLOB_LOADING) loadAndPlayAsBlob(i); else playTrack(i); });
        li.appendChild(btn); trackList.appendChild(li);
      });

      /* BREAKBREAK → components/remix-uploader.js
         Accepted: .m4a .flac .wav .mp3
         Server (Worker) must also validate MIME types:
           audio/mp4  audio/flac  audio/x-flac  audio/wav  audio/mpeg  */
      const ACCEPTED_EXTS = ["m4a","flac","wav","mp3"];
      const ACCEPTED_MIME = ["audio/mp4","audio/flac","audio/x-flac","audio/wav","audio/x-wav","audio/mpeg"];
      const rl = document.createElement("li");
      rl.innerHTML = '<div class="remix-row" role="button" tabindex="0" aria-label="Submit a remix"><input class="remix-file-input" type="file" accept=".m4a,.flac,.wav,.mp3,audio/mp4,audio/flac,audio/x-flac,audio/wav,audio/mpeg" id="remixFileInput"/><div class="remix-icon-cell" aria-hidden="true"><img src="' + ICON_LIGHT + '" alt=""/></div><div class="remix-info"><span class="remix-title">Submit a Remix</span><span class="remix-sub">m4a · flac · wav · mp3</span></div><div class="remix-cta" aria-live="polite" id="remixCta">+ Add</div></div>';
      trackList.appendChild(rl);
      const toast = document.createElement("p"); toast.className = "upload-toast"; toast.setAttribute("aria-live", "polite");
      trackList.parentElement.appendChild(toast);

      document.getElementById("remixFileInput").addEventListener("change", function () {
        const file = this.files[0]; if (!file) return;
        const cta = document.getElementById("remixCta");
        const ext  = file.name.split(".").pop().toLowerCase();
        const mime = (file.type || "").toLowerCase();
        const extOk  = ACCEPTED_EXTS.includes(ext);
        const mimeOk = ACCEPTED_MIME.some(m => mime.startsWith(m)) || mime === "";
        if (!extOk || !mimeOk) { cta.textContent = "REJECTED"; toast.textContent = "⚠ Only .m4a, .flac, .wav, and .mp3 accepted."; toast.classList.add("show"); return; }
        cta.textContent = "✓ Received";
        toast.textContent = "✓ " + file.name + " (" + (file.size / 1024 / 1024).toFixed(2) + " MB) — submission noted.";
        toast.classList.add("show");
        if (SONG_CONFIG.remixEndpoint) {
          const fd = new FormData(); fd.append("remix", file); fd.append("song", SONG_CONFIG.slug);
          fetch(SONG_CONFIG.remixEndpoint, { method: "POST", body: fd }).catch(err => { toast.textContent += " [Upload failed]"; console.error(err); });
        } else {
          console.log("[BroBot Remix] Would POST to /remixes/" + SONG_CONFIG.slug + "/" + file.name + " — set SONG_CONFIG.remixEndpoint to activate.");
        }
      });

      /* Hide Prev/Next on single-track pages */
      if (album.tracks.length === 1) { prevBtn.style.display = "none"; nextBtn.style.display = "none"; }
    }

    function updateTrackUI() { trackList.querySelectorAll(".track-btn").forEach((btn, i) => { const cur = i === currentIndex && isLoaded; btn.setAttribute("aria-current", cur ? "true" : "false"); btn.classList.toggle("is-playing", cur && !audio.paused); if (cur) btn.setAttribute("aria-label", "Track " + (i + 1) + ": " + album.tracks[i].title + " — " + (audio.paused ? "paused" : "now playing")); }); }

    /* Playback */
    function loadTrack(idx, f = false) { const si = Math.max(0, Math.min(idx, album.tracks.length - 1)), tr = album.tracks[si], { src, isFlac } = getBestSrc(tr, f); currentIndex = si; usedFallback = f || !isFlac; isLoaded = true; audio.src = src; audio.preload = "auto"; audio.load(); npTitle.textContent = tr.title; updateFmtBadge(isFlac); clearErr(); updateTrackUI(); updateMediaSession(tr); }
    async function playTrack(idx = currentIndex) { loadTrack(idx, false); setLoading(true); try { await waitForPrebuffer(); clearDLP(); await audio.play(); setPlayState(true); await acquireWake(); } catch (err) { clearDLP(); if (err.name === "NotAllowedError") showErr("Tap Play to begin — browser requires a direct tap."); else if (!usedFallback) { loadTrack(idx, true); await playTrack(idx); } else showErr("Playback failed. Check your audio URLs."); } }
    async function togglePlay() { if (!isLoaded) { if (USE_BLOB_LOADING) await loadAndPlayAsBlob(currentIndex); else await playTrack(currentIndex); return; } if (audio.paused) { try { await audio.play(); setPlayState(true); await acquireWake(); } catch (_) { showErr("Could not resume"); } } else { audio.pause(); setPlayState(false); dropWake(); } }
    function playPrev() { if (audio.currentTime > 3 && isLoaded) { audio.currentTime = 0; return; } const i = Math.max(0, currentIndex - 1); if (USE_BLOB_LOADING) loadAndPlayAsBlob(i); else playTrack(i); }
    function playNext() { if (currentIndex < album.tracks.length - 1) { if (USE_BLOB_LOADING) loadAndPlayAsBlob(currentIndex + 1); else playTrack(currentIndex + 1); } else if (repeatMode === "album") { if (USE_BLOB_LOADING) loadAndPlayAsBlob(0); else playTrack(0); } else { setPlayState(false); dropWake(); } }
    function setPlayState(on) { playBtn.textContent = on ? "⏸ Pause" : "▶ Play"; playBtn.style.fontSize = ""; playBtn.setAttribute("aria-label", on ? "Pause " + album.tracks[currentIndex]?.title : "Play " + album.tracks[currentIndex]?.title); playBtn.classList.remove("is-loading"); artWrap.classList.toggle("is-playing", on); liveDot.classList.toggle("active", on); setMediaPlayState(on ? "playing" : "paused"); updateTrackUI(); }
    function setLoading(on) { if (on) { playBtn.innerHTML = ""; playBtn.classList.add("is-loading"); playBtn.setAttribute("aria-label", "Loading…"); bufFill.classList.add("loading"); } else { playBtn.classList.remove("is-loading"); bufFill.classList.remove("loading"); } }
    function cycleRepeat() {
      const modes = album.tracks.length === 1 ? ["off","song"] : ["off","song","album"];
      repeatMode = modes[(modes.indexOf(repeatMode) + 1) % modes.length];
      const m = { off:{l:"↺ Repeat: Off",p:"false"}, song:{l:"↺ Repeat: Song",p:"true"}, album:{l:"↺ Repeat: Album",p:"true"} };
      repeatBtn.textContent = m[repeatMode].l; repeatBtn.dataset.mode = repeatMode;
      repeatBtn.setAttribute("aria-label", m[repeatMode].l + ". Press to cycle."); repeatBtn.setAttribute("aria-pressed", m[repeatMode].p);
    }

    /* Audio events */
    audio.addEventListener("ended", () => { if (upgradeToFullBlob()) return; if (repeatMode === "song") { audio.currentTime = 0; audio.play().catch(() => {}); return; } playNext(); });
    audio.addEventListener("playing", () => { bufFill.classList.remove("loading"); setPlayState(true); });
    audio.addEventListener("waiting", () => bufFill.classList.add("loading"));
    audio.addEventListener("pause", () => { artWrap.classList.remove("is-playing"); liveDot.classList.remove("active"); updateTrackUI(); });
    audio.addEventListener("play", () => updateTrackUI());
    let stallTimer;
    audio.addEventListener("stalled", () => { if (upgradeToFullBlob()) return; if (USE_BLOB_LOADING) return; clearTimeout(stallTimer); stallTimer = setTimeout(() => { if (!audio.paused) { const t = audio.currentTime; audio.load(); audio.currentTime = t; audio.play().catch(() => {}); } }, 1500); });
    audio.addEventListener("progress", () => clearTimeout(stallTimer));
    audio.addEventListener("playing", () => clearTimeout(stallTimer));
    audio.addEventListener("error", async () => { if (USE_BLOB_LOADING) return; if (!usedFallback) { loadTrack(currentIndex, true); try { await audio.play(); setPlayState(true); } catch (_) { showErr("Audio unavailable."); } } else showErr("Audio failed to load. Check URLs and MIME types."); });

    /* Progress */
    const fmt = s => !Number.isFinite(s) || s < 0 ? "0:00" : Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");
    audio.addEventListener("loadedmetadata", () => { durTimeEl.textContent = fmt(audio.duration); progBar.setAttribute("aria-valuemax", Math.floor(audio.duration)); const d = trackList.querySelectorAll(".track-dur"); if (d[currentIndex]) d[currentIndex].textContent = fmt(audio.duration); });
    audio.addEventListener("timeupdate", () => { if (isSeeking || !Number.isFinite(audio.duration) || !audio.duration) return; progBar.value = (audio.currentTime / audio.duration) * 100; progBar.setAttribute("aria-valuenow", Math.floor(audio.currentTime)); progBar.setAttribute("aria-valuetext", fmt(audio.currentTime) + " of " + fmt(audio.duration)); curTimeEl.textContent = fmt(audio.currentTime); updateMediaPosition(); });
    audio.addEventListener("progress", () => { if (USE_BLOB_LOADING) return; if (!audio.duration || !audio.buffered.length) return; bufFill.style.width = (audio.buffered.end(audio.buffered.length - 1) / audio.duration) * 100 + "%"; });
    progBar.addEventListener("mousedown", () => isSeeking = true);
    progBar.addEventListener("touchstart", () => isSeeking = true, { passive: true });
    progBar.addEventListener("input", () => { if (audio.duration) { const t = (progBar.value / 100) * audio.duration; curTimeEl.textContent = fmt(t); progBar.setAttribute("aria-valuetext", fmt(t) + " of " + fmt(audio.duration)); } });
    progBar.addEventListener("change", () => { if (audio.duration) audio.currentTime = (progBar.value / 100) * audio.duration; isSeeking = false; });
    progBar.addEventListener("mouseup", () => isSeeking = false);
    progBar.addEventListener("touchend", () => isSeeking = false);
    volBar.addEventListener("input", () => { audio.volume = volBar.value / 100; volPctEl.textContent = volBar.value + "%"; });

    /* BREAKBREAK → engine/media-session.js */
    function updateMediaSession(tr) {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: tr.title, artist: album.artist, album: album.title,
        artwork: [
          { src: album.artworkUrl, sizes: "96x96",   type: "image/jpeg" },
          { src: album.artworkUrl, sizes: "256x256",  type: "image/jpeg" },
          { src: album.artworkUrl, sizes: "512x512",  type: "image/jpeg" },
        ]
      });
      const h = { play: async () => { await togglePlay(); }, pause: () => { audio.pause(); setPlayState(false); dropWake(); }, previoustrack: playPrev, nexttrack: playNext, seekbackward: e => { audio.currentTime = Math.max(0, audio.currentTime - (e.seekOffset || 10)); }, seekforward: e => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + (e.seekOffset || 10)); }, seekto: e => { if (e.fastSeek && "fastSeek" in audio) audio.fastSeek(e.seekTime); else audio.currentTime = e.seekTime; } };
      for (const [a, fn] of Object.entries(h)) { try { navigator.mediaSession.setActionHandler(a, fn); } catch (_) {} }
    }
    function setMediaPlayState(s) { if ("mediaSession" in navigator) navigator.mediaSession.playbackState = s; }
    function updateMediaPosition() { if (!("mediaSession" in navigator) || !Number.isFinite(audio.duration)) return; try { navigator.mediaSession.setPositionState({ duration: audio.duration, playbackRate: audio.playbackRate, position: audio.currentTime }); } catch (_) {} }

    /* Keyboard */
    document.addEventListener("keydown", e => { if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return; switch (e.key) { case " ": case "MediaPlayPause": e.preventDefault(); togglePlay(); break; case "ArrowRight": e.preventDefault(); audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); break; case "ArrowLeft": e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 10); break; case "ArrowUp": e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.05); volBar.value = Math.round(audio.volume * 100); volPctEl.textContent = volBar.value + "%"; break; case "ArrowDown": e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.05); volBar.value = Math.round(audio.volume * 100); volPctEl.textContent = volBar.value + "%"; break; case "n": case "N": case "MediaTrackNext": playNext(); break; case "p": case "P": case "MediaTrackPrevious": playPrev(); break; case "r": case "R": cycleRepeat(); break; case "m": case "M": audio.muted = !audio.muted; break; } });

    /* BREAKBREAK → components/share-strip.js */
    function initShareStrip() {
      const btnNative = document.getElementById("btnNativeShare");
      const btnCopy   = document.getElementById("btnCopyLink");
      const shareData = {
        title: SONG_CONFIG.title + " — " + SONG_CONFIG.artist,
        text:  "Listen to " + SONG_CONFIG.title + " by " + SONG_CONFIG.artist,
        url:   SONG_CONFIG.pageUrl,
      };
      if (navigator.share) {
        btnNative.addEventListener("click", () => { navigator.share(shareData).catch(() => {}); });
      } else { btnNative.classList.add("hidden"); }
      if (navigator.clipboard) {
        btnCopy.addEventListener("click", () => {
          navigator.clipboard.writeText(SONG_CONFIG.pageUrl).then(() => {
            btnCopy.classList.add("copied");
            setTimeout(() => btnCopy.classList.remove("copied"), 2000);
          }).catch(() => {});
        });
      } else { btnCopy.classList.add("hidden"); }
    }

    /* BREAKBREAK → components/masthead.js
       Eyebrow: album up-link · artist link (both from SONG_CONFIG)
       Song pages:  albumUrl is non-empty → shows linked album name
       Album index: albumUrl is "" → shows only artist link */
    function initMasthead() {
      const eyebrow = document.getElementById("mastheadEyebrow");
      if (eyebrow) {
        const albumPart = SONG_CONFIG.albumUrl
          ? '<a href="' + SONG_CONFIG.albumUrl + '">' + SONG_CONFIG.album + '</a>'
          : '';
        const artistPart = '<a href="' + buildArtistUrl("header") + '" target="_blank" rel="noopener noreferrer" aria-label="' + SONG_CONFIG.artistLabel + ' (opens in new tab)">' + SONG_CONFIG.artist + '</a>';
        eyebrow.innerHTML = albumPart ? albumPart + ' \u00B7 ' + artistPart : artistPart;
      }
    }

    function initFooter() {
      const link = document.getElementById("footerArtistLink");
      if (link) { link.href = buildArtistUrl("footer"); link.textContent = SONG_CONFIG.artist; link.setAttribute("aria-label", SONG_CONFIG.artistLabel + " (opens in new tab)"); }
    }

    function showErr(m) { errLine.textContent = "⚠ " + m; errLine.classList.add("show"); }
    function clearErr()  { errLine.textContent = ""; errLine.classList.remove("show"); }

    playBtn.addEventListener("click",   togglePlay);
    prevBtn.addEventListener("click",   playPrev);
    nextBtn.addEventListener("click",   playNext);
    repeatBtn.addEventListener("click", cycleRepeat);

    /* BREAKBREAK → main.js — INIT */
    function init() {
      document.getElementById("albumArtImg").src = album.artworkUrl;
      initMasthead();
      initFooter();
      initShareStrip();
      renderTracks();
      if (!USE_BLOB_LOADING) { loadTrack(0); isLoaded = false; }
      updateMediaSession(album.tracks[0]);
      setPlayState(false);
      updateFmtBadge(flacOk);
    }

    init();
  </script>
</body>
</html>
