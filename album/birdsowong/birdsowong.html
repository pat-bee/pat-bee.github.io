  <style>
    /*
    index_album · Model 1 · Birdsowong theme
    Palette: warm brown, aged paper, dusty sage accent (borders only),
    muted ochre play button. No red.
    */
    :root {
      --bg:            #2A1E0E;
      --bg-panel:      #362610;
      --bg-raised:     #442E18;
      --bg-inset:      #1E1608;
      --ink:           #D4C89E;
      --ink-mid:       #8A7050;
      --ink-dim:       #564030;
      --ink-ghost:     rgba(212,200,158,0.07);
      --sage:          #50886A;
      --sage-bright:   #6AA882;
      --sage-dim:      #345248;
      --sage-pale:     rgba(80,136,106,0.14);
      --sage-faint:    rgba(80,136,106,0.07);
      --sage-border:   rgba(80,136,106,0.32);
      --ochre:         #7A5C2A;
      --ochre-bright:  #8E6C36;
      --ochre-text:    #E8D4A0;
      --border:        rgba(138,112,80,0.24);
      --border-mid:    rgba(138,112,80,0.38);
      --border-strong: rgba(138,112,80,0.56);
      --focus-ring:    #6AA882;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .skip-link {
      position: absolute; top: -100%; left: 12px; z-index: 99999;
      background: var(--sage); color: var(--bg);
      padding: 8px 18px; font-family: 'Courier Prime', monospace;
      font-size: 0.8rem; letter-spacing: 0.06em; text-decoration: none; transition: top 200ms;
    }
    .skip-link:focus { top: 0; }
    :focus-visible { outline: 1px solid var(--focus-ring); outline-offset: 3px; }

    html {
      background-color: #2A1E0E; background: var(--bg); color: var(--ink);
      font-family: 'Courier Prime', 'Courier New', monospace;
      min-height: 100%; -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh; background-color: #2A1E0E;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(212,200,158,0.06), transparent 52%),
        radial-gradient(ellipse at 18% 75%, rgba(138,112,80,0.06), transparent 42%),
        radial-gradient(ellipse at 82% 25%, rgba(80,136,106,0.025), transparent 38%),
        repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(212,200,158,0.024) 47px, rgba(212,200,158,0.024) 48px),
        #2A1E0E;
      position: relative; overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(212,200,158,0.05) 1px, transparent 1px);
      background-size: 34px 34px; background-position: 17px 17px;
    }
    body::after {
      content: "Ch.A · Signal · Unverified · Last sweep unknown · Ch.A · Signal ·";
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Grenze', serif; font-weight: 200; font-style: italic;
      font-size: 0.44rem; letter-spacing: 0.18em; color: rgba(80,136,106,0.045);
      text-align: center; line-height: 5; word-break: break-all;
    }

    button { font-family: 'Courier Prime', monospace; color: inherit; cursor: pointer; }
    .page-shell { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 36px 20px 60px; }
    .inner { width: 100%; max-width: 880px; }

    /* ── MASTHEAD ─────────────────────────────────────────────── */
    .masthead {
      position: relative; padding: 20px 24px 14px;
      background: var(--bg-panel); border: 1px solid var(--border-strong);
      border-bottom: 2px solid var(--sage-dim); overflow: hidden;
    }
    .masthead::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(138,80,30,0.5) 18%, rgba(138,80,30,0.28) 55%, transparent 100%);
    }
    .masthead::after {
      content: "+"; position: absolute; top: 5px; right: 8px;
      font-family: 'Courier Prime', monospace; font-size: 0.55rem; color: var(--ink-dim); pointer-events: none;
    }
    .masthead-eyebrow {
      font-family: 'Courier Prime', monospace; font-size: 0.52rem;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 6px;
    }
    .masthead-eyebrow a {
      color: var(--ink-dim); text-decoration: none;
      transition: color 160ms;
      border-bottom: 1px solid transparent;
    }
    .masthead-eyebrow a:hover { color: var(--sage); border-bottom-color: var(--sage-border); }
    .masthead-titles { min-width: 0; overflow: hidden; container-type: inline-size; }
    .masthead-title {
      font-family: 'Grenze', serif;
      font-weight: 200;
      font-style: normal;
      font-size: clamp(2.2rem, 13cqi, 6rem);
      white-space: nowrap; overflow: hidden; text-overflow: clip;
      line-height: 1.2;
      padding-bottom: 0.08em;
      color: var(--ink);
      text-shadow: 1px 2px 4px rgba(22,14,4,0.65);
    }

    /* ── SHARE STRIP ─────────────────────────────────────────── */
    .share-strip {
      display: flex; justify-content: center; align-items: center;
      gap: 18px; margin: 18px 0 10px;
    }
    .share-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: transparent; border: 1px solid var(--border-mid);
      color: var(--ink-mid); cursor: pointer;
      transition: border-color 140ms, color 140ms, background 140ms;
      padding: 0; position: relative;
    }
    .share-btn:hover { border-color: var(--sage-border); color: var(--sage); background: var(--sage-faint); }
    .share-btn:active { transform: scale(0.94); }
    .share-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .share-btn.copied::after {
      content: "Copied"; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
      font-family: 'Courier Prime', monospace; font-size: 0.44rem; letter-spacing: 0.1em;
      color: var(--sage); white-space: nowrap; pointer-events: none;
    }
    .share-btn.hidden { display: none; }

    /* ── MAIN GRID ──────────────────────────────────────────────── */
    .main-grid {
      display: grid; grid-template-columns: minmax(210px, 340px) 1fr;
      border: 1px solid var(--border-strong); border-top: none; background: var(--bg-panel);
    }
    .col-art { border-right: 1px solid var(--border-strong); }
    .col-player { padding: 20px; display: flex; flex-direction: column; gap: 13px; min-width: 0; }

    /* ── ALBUM ART ────────────────────────────────────────────── */
    .art-wrap {
      position: relative; width: 100%; aspect-ratio: 1 / 1;
      overflow: hidden; background: var(--bg-inset); display: block;
      transition: box-shadow 1000ms;
    }
    .art-wrap.is-playing { box-shadow: 0 0 20px rgba(80,136,106,0.07), inset 0 0 5px rgba(80,136,106,0.04); }
    .art-wrap::before {
      content: ""; position: absolute; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 42%, rgba(22,14,4,0.72) 100%);
    }
    .art-wrap::after {
      content: ""; position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background-image: linear-gradient(rgba(80,136,106,0.038) 1px, transparent 1px), linear-gradient(90deg, rgba(80,136,106,0.038) 1px, transparent 1px);
      background-size: 25% 25%;
    }
    .art-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block; position: relative; z-index: 2;
      filter: brightness(0.78) saturate(0.55) sepia(0.18);
      transition: filter 900ms, opacity 180ms ease;
    }
    .art-wrap.is-playing img { animation: scope-breathe 9s ease-in-out infinite alternate; }
    @keyframes scope-breathe {
      from { filter: brightness(0.78) saturate(0.55) sepia(0.18); }
      to   { filter: brightness(0.86) saturate(0.62) sepia(0.14); }
    }
    .eq-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; height: 20%;
      display: flex; align-items: flex-end; gap: 2px; padding: 0 14%;
      opacity: 0; transition: opacity 900ms; z-index: 5;
    }
    .art-wrap.is-playing .eq-overlay { opacity: 1; }
    .eq-b { flex: 1; background: var(--sage); min-height: 1px; animation: vu-bar 0.65s ease infinite alternate; opacity: 0.4; }
    .eq-b:nth-child(1){animation-delay:0.00s}.eq-b:nth-child(2){animation-delay:0.09s}
    .eq-b:nth-child(3){animation-delay:0.18s}.eq-b:nth-child(4){animation-delay:0.05s}
    .eq-b:nth-child(5){animation-delay:0.14s}.eq-b:nth-child(6){animation-delay:0.23s}
    .eq-b:nth-child(7){animation-delay:0.07s}.eq-b:nth-child(8){animation-delay:0.16s}
    @keyframes vu-bar { from { height: 3%; } to { height: 68%; } }

    /* Now Playing */
    .np-label { font-family: 'Courier Prime', monospace; font-size: 0.5rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 3px; }
    .np-title { font-family: 'Grenze', serif; font-weight: 200; font-style: italic; font-size: 1.3rem; line-height: 1.1; color: var(--ink); word-break: break-word; }
    .np-meta { display: flex; gap: 8px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
    .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--ink-ghost); border: 1px solid var(--border); flex-shrink: 0; transition: all 200ms; }
    .live-dot.active { background: var(--sage); border-color: var(--sage-bright); box-shadow: 0 0 6px rgba(80,136,106,0.35); animation: sage-pulse 1.5s ease-in-out infinite; }
    @keyframes sage-pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .badge { font-family: 'Courier Prime', monospace; font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border: 1px solid var(--border); color: var(--ink-mid); }
    .badge-flac { border-color: var(--sage-border); color: var(--sage); }
    .badge-wake.active { border-color: var(--border-mid); color: var(--ink-mid); }
    .buf-wrap { width: 100%; height: 2px; background: var(--ink-ghost); }
    .buf-fill { height: 100%; background: var(--ink-dim); width: 0%; transition: width 400ms; }
    .buf-fill.loading { animation: buf-flicker 1.1s ease-in-out infinite; }
    @keyframes buf-flicker { 0%,100%{opacity:0.2} 50%{opacity:0.75} }

    /* Seek bar */
    .prog-row { display: grid; grid-template-columns: 46px 1fr 46px; gap: 8px; align-items: center; font-family: 'Courier Prime', monospace; font-size: 0.64rem; color: var(--ink-mid); font-variant-numeric: tabular-nums; }
    .prog-bar { appearance: none; width: 100%; height: 5px; background: var(--sage-faint); border: 1px solid var(--border); border-radius: 0; cursor: pointer; }
    .prog-bar::-webkit-slider-thumb { appearance: none; width: 10px; height: 20px; background: var(--sage); border: 1px solid var(--bg); border-radius: 0; cursor: pointer; }
    .prog-bar::-moz-range-thumb { width: 10px; height: 20px; background: var(--sage); border: none; border-radius: 0; cursor: pointer; }

    /* Controls */
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .ctrl-btn { border: 1px solid var(--border-mid); background: var(--bg-raised); color: var(--ink-mid); font-family: 'Courier Prime', monospace; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0 14px; min-height: 36px; transition: background 120ms, border-color 120ms, color 120ms, transform 80ms; position: relative; overflow: hidden; }
    .ctrl-btn:hover { background: var(--sage-faint); border-color: var(--sage-border); color: var(--ink); }
    .ctrl-btn:active { transform: translate(1px,1px); }
    /* Play button — muted ochre (old brass). NOT green. */
    .play-btn { min-width: 136px; min-height: 50px; font-family: 'Grenze', serif; font-weight: 200; font-style: italic; font-size: 1.2rem; letter-spacing: 0.04em; background: var(--ochre); color: var(--ochre-text); border: 1px solid var(--ochre-bright); box-shadow: 2px 2px 0 rgba(22,14,4,0.65), 0 0 8px rgba(122,92,42,0.08); }
    .play-btn:hover { background: var(--ochre-bright); color: #F0E0B0; box-shadow: 3px 3px 0 rgba(22,14,4,0.65); }
    .play-btn:active { transform: translate(2px,2px); box-shadow: none; }
    .play-btn.is-loading { background: var(--bg-raised); border-color: var(--border); cursor: wait; }
    .play-btn.is-loading::after { content: ""; position: absolute; top:50%; left:50%; width: 14px; height: 14px; border: 1.5px solid rgba(122,92,42,0.2); border-top-color: var(--ochre); border-radius: 50%; transform: translate(-50%,-50%); animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    .repeat-btn { min-width: 130px; font-size: 0.62rem; }
    .repeat-btn[data-mode="song"]  { border-style: dashed; border-color: var(--sage-border); color: var(--sage); }
    .repeat-btn[data-mode="album"] { border-style: dotted; }
    .kbd-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .kbd-hint { font-size: 0.48rem; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    kbd { display: inline-block; padding: 0 4px; border: 1px solid var(--border); font-size: 0.48rem; font-family: inherit; color: var(--ink-mid); background: var(--bg-inset); }
    .status-line { font-family: 'Courier Prime', monospace; font-size: 0.52rem; color: var(--ink-dim); line-height: 1.5; letter-spacing: 0.04em; }
    .err-line { font-family: 'Courier Prime', monospace; font-size: 0.6rem; color: var(--sage); display: none; line-height: 1.4; border-left: 1px solid var(--sage-border); padding-left: 8px; }
    .err-line.show { display: block; }

    /* ── PLAYLIST ─────────────────────────────────────────────── */
    .playlist-section { border: 1px solid var(--border-strong); border-top: none; background: var(--bg-panel); }
    .playlist-header { padding: 8px 20px; border-bottom: 1px solid var(--border); font-family: 'Courier Prime', monospace; font-size: 0.48rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--ink-dim); display: flex; justify-content: space-between; align-items: center; }
    .playlist-header::before { content: "Recording Log"; font-family: 'Grenze', serif; font-weight: 200; font-size: 0.8rem; color: rgba(80,136,106,0.24); letter-spacing: 0.04em; font-style: italic; }
    .track-list { list-style: none; }
    .track-btn, .remix-row { width: 100%; display: grid; grid-template-columns: 52px 1fr auto; align-items: stretch; text-align: left; border: none; border-bottom: 1px solid var(--border); transition: background 100ms; }
    .track-list li:last-child .track-btn, .track-list li:last-child .remix-row { border-bottom: none; }
    .track-btn { background: transparent; cursor: pointer; }
    .track-btn:hover { background: var(--sage-faint); }
    .track-btn[aria-current="true"] { background: var(--sage-faint); box-shadow: inset 3px 0 0 var(--sage-dim); }
    .track-btn[aria-current="true"] .track-num { color: var(--sage); }
    .track-btn[aria-current="true"].is-playing .track-num { animation: sage-pulse 1.5s ease-in-out infinite; }
    .track-num { display: flex; align-items: center; justify-content: center; padding: 16px 0; border-right: 1px solid var(--border); font-family: 'Courier Prime', monospace; font-size: 0.88rem; letter-spacing: 0.06em; color: var(--ink-dim); min-width: 52px; }
    .track-info-col { padding: 13px 16px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
    .track-title-text { font-family: 'Grenze', serif; font-weight: 200; font-style: italic; font-size: 1.05rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-meta-text { font-family: 'Courier Prime', monospace; font-size: 0.48rem; color: var(--ink-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .track-dur { display: flex; align-items: center; padding: 13px 14px; font-family: 'Courier Prime', monospace; font-size: 0.64rem; color: var(--ink-dim); border-left: 1px solid var(--border); white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* ── REMIX ROW ────────────────────────────────────────────── */
    .remix-row { background: var(--sage-faint); border-top: 1px dashed var(--sage-border); cursor: pointer; position: relative; }
    .remix-row:hover { background: var(--sage-pale); }
    .remix-row:focus-within { outline: 1px solid var(--focus-ring); outline-offset: -2px; }
    .remix-file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
    .remix-icon-cell { display: flex; align-items: center; justify-content: center; padding: 12px 0; border-right: 1px dashed var(--sage-border); min-width: 52px; }
    .remix-icon-cell img { width: 24px; height: 24px; object-fit: contain; opacity: 0.4; }
    .remix-info { padding: 11px 16px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
    .remix-title { font-family: 'Grenze', serif; font-weight: 200; font-style: italic; font-size: 0.95rem; color: var(--sage); }
    .remix-sub { font-family: 'Courier Prime', monospace; font-size: 0.46rem; color: var(--ink-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .remix-status { display: flex; align-items: center; padding: 11px 14px; font-family: 'Courier Prime', monospace; font-size: 0.54rem; color: var(--sage); border-left: 1px dashed var(--sage-border); white-space: nowrap; letter-spacing: 0.1em; text-transform: uppercase; }
    .upload-toast { display: none; padding: 8px 20px; font-family: 'Courier Prime', monospace; font-size: 0.52rem; color: var(--ink-mid); letter-spacing: 0.06em; background: var(--sage-faint); border-top: 1px solid var(--border); }
    .upload-toast.show { display: block; }

    /* ── FOOTER ──────────────────────────────────────────────── */
    .page-footer { margin-top: 22px; text-align: center; width: 100%; }
    .page-footer a { font-family: 'Courier Prime', monospace; font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mid); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 2px; transition: color 160ms, border-color 160ms; }
    .page-footer a:hover { color: var(--sage); border-color: var(--sage-border); }

    /* ── MOBILE ─────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .page-shell { padding: 14px 12px 44px; }
      .main-grid { grid-template-columns: 1fr; }
      .col-art { border-right: none; border-bottom: 1px solid var(--border-strong); }
      .col-player { padding: 14px; }
      .kbd-row { display: none; }
      .track-btn, .remix-row { grid-template-columns: 44px 1fr auto; }
      .track-num, .remix-icon-cell { min-width: 44px; }
    }

    audio { position: fixed; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>
</head>

  <a class="skip-link" href="#main-content">Skip to main content</a>
  <main class="page-shell" id="main-content">

      }
    }

    function showDLP(pct) { if (pct === 0) bufFill.style.width = "0%"; playBtn.classList.remove("is-loading"); playBtn.textContent = pct === null ? "Buffering…" : pct === 0 ? "Loading…" : pct + "%"; playBtn.style.fontSize = "0.8rem"; playBtn.setAttribute("aria-label", "Loading…"); bufFill.style.width = pct ? pct + "%" : "0%"; bufFill.style.background = "var(--sage)"; bufFill.classList.remove("loading"); }
    function clearDLP() { playBtn.classList.remove("is-loading"); playBtn.style.fontSize = ""; bufFill.style.background = ""; }

    /* Streaming fallback */
    function waitForPrebuffer() { return new Promise(resolve => { function check() { if (!audio.duration || !audio.buffered.length) { requestAnimationFrame(check); return; } const b = audio.buffered.end(audio.buffered.length - 1); if (b >= Math.min(MIN_PREBUFFER_SECONDS, audio.duration)) resolve(); else { bufFill.style.width = Math.round((b / audio.duration) * 100) + "%"; bufFill.style.background = "var(--sage)"; requestAnimationFrame(check); } } check(); }); }
    setInterval(() => { if (USE_BLOB_LOADING) return; if (audio.paused || !audio.duration || !audio.buffered.length) return; const a = audio.buffered.end(audio.buffered.length - 1) - audio.currentTime; if (a < DANGER_SECONDS && !isRebuffering) { isRebuffering = true; audio.pause(); bufFill.classList.add("loading"); const p = setInterval(() => { if (!audio.buffered.length) return; const r = audio.buffered.end(audio.buffered.length - 1) - audio.currentTime; if (r >= DANGER_SECONDS * 3) { clearInterval(p); isRebuffering = false; bufFill.classList.remove("loading"); audio.play().catch(() => {}); } }, 500); } }, 2000);

    /* Track list renderer */
    function renderTracks() {
      trackList.innerHTML = "";
      const el = document.getElementById("trackCount");
      if (el) el.textContent = album.tracks.length + " Recording" + (album.tracks.length !== 1 ? "s" : "");

      album.tracks.forEach((tr, i) => {
        const li = document.createElement("li"), btn = document.createElement("button");
        btn.className = "track-btn"; btn.type = "button";
        btn.setAttribute("aria-current", "false");
        btn.setAttribute("aria-label", "Track " + (i + 1) + ": " + tr.title + " by " + album.artist);
        btn.innerHTML = '<span class="track-num" aria-hidden="true">' + String(i + 1).padStart(2, "0") + '</span><span class="track-info-col"><span class="track-title-text">' + tr.title + '</span><span class="track-meta-text">' + album.artist + '</span></span><span class="track-dur" aria-label="Duration: ' + tr.duration + '">' + tr.duration + '</span>';
        btn.addEventListener("click", () => { if (USE_BLOB_LOADING) loadAndPlayAsBlob(i); else playTrack(i); });
        li.appendChild(btn); trackList.appendChild(li);
      });

      /* Remix row */
      const ACCEPTED_EXTS = ["m4a","flac","wav","mp3"];
      const ACCEPTED_MIME = ["audio/mp4","audio/flac","audio/x-flac","audio/wav","audio/x-wav","audio/mpeg"];
      const rl = document.createElement("li");
      rl.innerHTML = '<div class="remix-row" role="button" tabindex="0" aria-label="Submit a remix"><input class="remix-file-input" type="file" accept=".m4a,.flac,.wav,.mp3,audio/mp4,audio/flac,audio/x-flac,audio/wav,audio/mpeg" id="remixFileInput"/><div class="remix-icon-cell" aria-hidden="true"><img src="' + ICON_LIGHT + '" alt=""/></div><div class="remix-info"><span class="remix-title">Submit a Remix</span><span class="remix-sub">m4a · flac · wav · mp3</span></div><div class="remix-status" aria-live="polite" id="remixStatus">+ Add</div></div>';
      trackList.appendChild(rl);
      const toast = document.createElement("p"); toast.className = "upload-toast"; toast.setAttribute("aria-live", "polite");
      trackList.parentElement.appendChild(toast);

      document.getElementById("remixFileInput").addEventListener("change", function () {
        const file = this.files[0]; if (!file) return;
        const cta = document.getElementById("remixStatus");
        const ext  = file.name.split(".").pop().toLowerCase();
        const mime = (file.type || "").toLowerCase();
        const extOk  = ACCEPTED_EXTS.includes(ext);
        const mimeOk = ACCEPTED_MIME.some(m => mime.startsWith(m)) || mime === "";
        if (!extOk || !mimeOk) { cta.textContent = "REJECTED"; toast.textContent = "// Only .m4a, .flac, .wav, and .mp3 accepted."; toast.classList.add("show"); return; }
        cta.textContent = "✓ Received";
        toast.textContent = "// Received: " + file.name + " (" + (file.size / 1024 / 1024).toFixed(2) + " MB)";
        toast.classList.add("show");
        if (SONG_CONFIG.remixEndpoint) {
          const fd = new FormData(); fd.append("remix", file); fd.append("song", SONG_CONFIG.slug);
          fetch(SONG_CONFIG.remixEndpoint, { method: "POST", body: fd }).catch(err => { toast.textContent += " [Upload failed]"; console.error(err); });
        } else {
          console.log("[Remix] Would POST to /remixes/" + SONG_CONFIG.slug + "/" + file.name + " — set SONG_CONFIG.remixEndpoint to activate.");
        }
      });

      if (album.tracks.length === 1) { prevBtn.style.display = "none"; nextBtn.style.display = "none"; }
    }

    function updateTrackUI() { trackList.querySelectorAll(".track-btn").forEach((btn, i) => { const cur = i === currentIndex && isLoaded; btn.setAttribute("aria-current", cur ? "true" : "false"); btn.classList.toggle("is-playing", cur && !audio.paused); if (cur) btn.setAttribute("aria-label", "Track " + (i + 1) + ": " + album.tracks[i].title + " — " + (audio.paused ? "paused" : "now playing")); }); }

    /* Playback */
    function loadTrack(idx, f = false) { const si = Math.max(0, Math.min(idx, album.tracks.length - 1)), tr = album.tracks[si], { src, isFlac } = getBestSrc(tr, f); currentIndex = si; usedFallback = f || !isFlac; isLoaded = true; audio.src = src; audio.preload = "auto"; audio.load(); npTitle.textContent = tr.title; updateFmtBadge(isFlac); clearErr(); updateTrackUI(); updateMediaSession(tr); }
    async function playTrack(idx = currentIndex) { loadTrack(idx, false); setLoading(true); try { await waitForPrebuffer(); clearDLP(); await audio.play(); setPlayState(true); await acquireWake(); } catch (err) { clearDLP(); if (err.name === "NotAllowedError") showErr("// Tap Play to begin"); else if (!usedFallback) { loadTrack(idx, true); await playTrack(idx); } else showErr("// Playback failed"); } }
    async function togglePlay() { if (!isLoaded) { if (USE_BLOB_LOADING) await loadAndPlayAsBlob(currentIndex); else await playTrack(currentIndex); return; } if (audio.paused) { try { await audio.play(); setPlayState(true); await acquireWake(); } catch (_) { showErr("// Could not resume"); } } else { audio.pause(); setPlayState(false); dropWake(); } }
    function playPrev() { if (audio.currentTime > 3 && isLoaded) { audio.currentTime = 0; return; } const i = Math.max(0, currentIndex - 1); if (USE_BLOB_LOADING) loadAndPlayAsBlob(i); else playTrack(i); }
    function playNext() { if (currentIndex < album.tracks.length - 1) { if (USE_BLOB_LOADING) loadAndPlayAsBlob(currentIndex + 1); else playTrack(currentIndex + 1); } else if (repeatMode === "album") { if (USE_BLOB_LOADING) loadAndPlayAsBlob(0); else playTrack(0); } else { setPlayState(false); dropWake(); } }
    function setPlayState(on) { playBtn.textContent = on ? "⏸ Pause" : "▶ Play"; playBtn.style.fontSize = ""; playBtn.setAttribute("aria-label", on ? "Pause " + album.tracks[currentIndex]?.title : "Play " + album.tracks[currentIndex]?.title); playBtn.classList.remove("is-loading"); artWrap.classList.toggle("is-playing", on); liveDot.classList.toggle("active", on); setMediaPlayState(on ? "playing" : "paused"); updateTrackUI(); }
    function setLoading(on) { if (on) { playBtn.innerHTML = ""; playBtn.classList.add("is-loading"); playBtn.setAttribute("aria-label", "Loading…"); bufFill.classList.add("loading"); } else { playBtn.classList.remove("is-loading"); bufFill.classList.remove("loading"); } }
    function cycleRepeat() { const modes = album.tracks.length === 1 ? ["off","song"] : ["off","song","album"]; repeatMode = modes[(modes.indexOf(repeatMode) + 1) % modes.length]; const m = { off:{l:"↺ Repeat: Off",p:"false"}, song:{l:"↺ Repeat: Song",p:"true"}, album:{l:"↺ Repeat: Album",p:"true"} }; repeatBtn.textContent = m[repeatMode].l; repeatBtn.dataset.mode = repeatMode; repeatBtn.setAttribute("aria-label", m[repeatMode].l + ". Press to cycle."); repeatBtn.setAttribute("aria-pressed", m[repeatMode].p); }

    /* Audio events */
    audio.addEventListener("ended", () => { if (upgradeToFullBlob()) return; if (repeatMode === "song") { audio.currentTime = 0; audio.play().catch(() => {}); return; } playNext(); });
    audio.addEventListener("playing", () => { bufFill.classList.remove("loading"); setPlayState(true); });
    audio.addEventListener("waiting", () => bufFill.classList.add("loading"));
    audio.addEventListener("pause", () => { artWrap.classList.remove("is-playing"); liveDot.classList.remove("active"); updateTrackUI(); });
    audio.addEventListener("play", () => updateTrackUI());
    let stallTimer;
    audio.addEventListener("stalled", () => { if (upgradeToFullBlob()) return; if (USE_BLOB_LOADING) return; clearTimeout(stallTimer); stallTimer = setTimeout(() => { if (!audio.paused) { const t = audio.currentTime; audio.load(); audio.currentTime = t; audio.play().catch(() => {}); } }, 1500); });
    audio.addEventListener("progress", () => clearTimeout(stallTimer));
    audio.addEventListener("playing", () => clearTimeout(stallTimer));
    audio.addEventListener("error", async () => { if (USE_BLOB_LOADING) return; if (!usedFallback) { loadTrack(currentIndex, true); try { await audio.play(); setPlayState(true); } catch (_) { showErr("// Signal lost"); } } else showErr("// Playback failed"); });

    /* Progress */
    const fmt = s => !Number.isFinite(s) || s < 0 ? "0:00" : Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");
    audio.addEventListener("loadedmetadata", () => { durTimeEl.textContent = fmt(audio.duration); progBar.setAttribute("aria-valuemax", Math.floor(audio.duration)); const d = trackList.querySelectorAll(".track-dur"); if (d[currentIndex]) d[currentIndex].textContent = fmt(audio.duration); });
    audio.addEventListener("timeupdate", () => { if (isSeeking || !Number.isFinite(audio.duration) || !audio.duration) return; progBar.value = (audio.currentTime / audio.duration) * 100; progBar.setAttribute("aria-valuenow", Math.floor(audio.currentTime)); progBar.setAttribute("aria-valuetext", fmt(audio.currentTime) + " of " + fmt(audio.duration)); curTimeEl.textContent = fmt(audio.currentTime); updateMediaPosition(); });
    audio.addEventListener("progress", () => { if (USE_BLOB_LOADING) return; if (!audio.duration || !audio.buffered.length) return; bufFill.style.width = (audio.buffered.end(audio.buffered.length - 1) / audio.duration) * 100 + "%"; });
    progBar.addEventListener("mousedown", () => isSeeking = true);
    progBar.addEventListener("touchstart", () => isSeeking = true, { passive: true });
    progBar.addEventListener("input", () => { if (audio.duration) { const t = (progBar.value / 100) * audio.duration; curTimeEl.textContent = fmt(t); progBar.setAttribute("aria-valuetext", fmt(t) + " of " + fmt(audio.duration)); } });
    progBar.addEventListener("change", () => { if (audio.duration) audio.currentTime = (progBar.value / 100) * audio.duration; isSeeking = false; });
    progBar.addEventListener("mouseup", () => isSeeking = false);
    progBar.addEventListener("touchend", () => isSeeking = false);

    /* Media Session */
    function updateMediaSession(tr) { if (!("mediaSession" in navigator)) return; navigator.mediaSession.metadata = new MediaMetadata({ title: tr.title, artist: album.artist, album: album.title, artwork: [{ src: album.artworkUrl, sizes: "512x512", type: "image/png" }] }); const h = { play: async () => { await togglePlay(); }, pause: () => { audio.pause(); setPlayState(false); dropWake(); }, previoustrack: playPrev, nexttrack: playNext, seekbackward: e => { audio.currentTime = Math.max(0, audio.currentTime - (e.seekOffset || 10)); }, seekforward: e => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + (e.seekOffset || 10)); }, seekto: e => { if (e.fastSeek && "fastSeek" in audio) audio.fastSeek(e.seekTime); else audio.currentTime = e.seekTime; } }; for (const [a, fn] of Object.entries(h)) { try { navigator.mediaSession.setActionHandler(a, fn); } catch (_) {} } }
    function setMediaPlayState(s) { if ("mediaSession" in navigator) navigator.mediaSession.playbackState = s; }
    function updateMediaPosition() { if (!("mediaSession" in navigator) || !Number.isFinite(audio.duration)) return; try { navigator.mediaSession.setPositionState({ duration: audio.duration, playbackRate: audio.playbackRate, position: audio.currentTime }); } catch (_) {} }

    /* Keyboard — volume slider removed, ArrowUp/Down still adjust audio.volume directly */
    document.addEventListener("keydown", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      switch (e.key) {
        case " ": case "MediaPlayPause": e.preventDefault(); togglePlay(); break;
        case "ArrowRight": e.preventDefault(); audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); break;
        case "ArrowLeft":  e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 10); break;
        case "ArrowUp":    e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.05); break;
        case "ArrowDown":  e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.05); break;
        case "n": case "N": case "MediaTrackNext":     playNext(); break;
        case "p": case "P": case "MediaTrackPrevious": playPrev(); break;
        case "r": case "R": cycleRepeat(); break;
        case "m": case "M": audio.muted = !audio.muted; break;
      }
    });

    /* Share strip */
    function initShareStrip() {
      const btnNative = document.getElementById("btnNativeShare");
      const btnCopy   = document.getElementById("btnCopyLink");
      const shareData = { title: SONG_CONFIG.title + " — " + SONG_CONFIG.artist, text: "Listen to " + SONG_CONFIG.title + " by " + SONG_CONFIG.artist, url: SONG_CONFIG.pageUrl };
      if (navigator.share) {
        btnNative.addEventListener("click", () => { navigator.share(shareData).catch(() => {}); });
      } else { btnNative.classList.add("hidden"); }
      if (navigator.clipboard) {
        btnCopy.addEventListener("click", () => {
          navigator.clipboard.writeText(SONG_CONFIG.pageUrl).then(() => {
            btnCopy.classList.add("copied"); setTimeout(() => btnCopy.classList.remove("copied"), 2000);
          }).catch(() => {});
        });
      } else { btnCopy.classList.add("hidden"); }
    }

    /* Masthead — eyebrow rendered from SONG_CONFIG.
       albumLabel ("Album-Index") is used as the link text for the up-link.
       albumUrl ("../") is the href. Both are separate from album ("index_album")
       which is reserved for Media Session metadata only. */
    function initMasthead() {
      const eyebrow = document.getElementById("mastheadEyebrow");
      if (eyebrow) {
        const albumPart = SONG_CONFIG.albumUrl
          ? '<a href="' + SONG_CONFIG.albumUrl + '">' + (SONG_CONFIG.albumLabel || SONG_CONFIG.album) + '</a>'
          : '';
        const artistPart = '<a href="' + buildArtistUrl("header") + '" target="_blank" rel="noopener noreferrer" aria-label="' + SONG_CONFIG.artistLabel + ' (opens in new tab)">' + SONG_CONFIG.artist + '</a>';
        eyebrow.innerHTML = albumPart ? albumPart + ' · ' + artistPart : artistPart;
      }
    }

    function initFooter() {
      const link = document.getElementById("footerArtistLink");
      if (link) { link.href = buildArtistUrl("footer"); link.textContent = SONG_CONFIG.artist; link.setAttribute("aria-label", SONG_CONFIG.artistLabel + " (opens in new tab)"); }
    }

    function showErr(m) { errLine.textContent = m; errLine.classList.add("show"); }
    function clearErr()  { errLine.textContent = ""; errLine.classList.remove("show"); }

    playBtn.addEventListener("click",   togglePlay);
    prevBtn.addEventListener("click",   playPrev);
    nextBtn.addEventListener("click",   playNext);
    repeatBtn.addEventListener("click", cycleRepeat);

    /* Init */
    function init() {
      document.getElementById("albumArtImg").src = ALBUM_ART_URL;
      initMasthead();
      initFooter();
      initShareStrip();
      renderTracks();
      if (!USE_BLOB_LOADING) { loadTrack(0); isLoaded = false; }
      updateMediaSession(album.tracks[0]);
      setPlayState(false);
      updateFmtBadge(flacOk);
    }

    init();
  </script>
</body>
</html>
