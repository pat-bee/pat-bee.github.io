<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Statements</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Open Sans', sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .half {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: clamp(1rem, 3.5vw, 3rem) clamp(1.6rem, 7vw, 6rem);
    }

    .half.light { background: #ffffff; }
    .half.dark  { background: #0a0a0a; }

    h1 {
      font-family: 'Open Sans', sans-serif;
      font-weight: 300;
      
    }

    .half.light h1 { color: #000000; }
    .half.dark  h1 { color: #ffffff; }

    .divider {
      text-align: center;
      color: #7f7f7f;
      font-size: clamp(0.85rem, 2vw, 1.4rem);
      font-weight: 300;
      line-height: 1;
      flex-shrink: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    #app { animation: fadeIn 0.5s ease; }
  </style>
</head>
<body>
<div id="app">
  <div class="half light" id="lightHalf"></div>
  <div class="half dark"  id="darkHalf"></div>
  <div><p style="text-align: center;">-</p></div>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────
  // Google Sheet published as CSV (File → Share → Publish to web → CSV)
  const SHEET_CSV_URL =
    'https://docs.google.com/spreadsheets/d/1IF2tmMmEuBjdUvvJCN8K1uiE4RXbj1XkKOyUsBF_qDQ/export?format=csv&gid=0';

  const COUNT = 5; // statements per half

  // ── DAILY SEED ───────────────────────────────────────────────────
  // "Today" resets at 4am — same seed for everyone visiting the same day
  function getDailySeed() {
    const shifted = new Date(Date.now() - 4 * 60 * 60 * 1000);
    const y = shifted.getFullYear();
    const m = String(shifted.getMonth() + 1).padStart(2, '0');
    const d = String(shifted.getDate()).padStart(2, '0');
    return parseInt(`${y}${m}${d}`, 10);
  }

  // Mulberry32 seeded PRNG
  function makeRng(seed) {
    let s = seed >>> 0;
    return () => {
      s += 0x6D2B79F5;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // Seeded shuffle, return first n
  function pickN(arr, n, rng) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a.slice(0, Math.min(n, a.length));
  }

  // ── CSV PARSER ────────────────────────────────────────────────────
  function parseCSV(text) {
    return text.trim().split('\n').map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      return cols;
    });
  }

  // ── RENDER ────────────────────────────────────────────────────────
  function render(doList, avoidList) {
    const seed  = getDailySeed();
    const light = pickN(doList,    COUNT, makeRng(seed));
    const dark  = pickN(avoidList, COUNT, makeRng(seed + 1));

    function appendWithDividers(list, containerId) {
      const container = document.getElementById(containerId);
      list.forEach((text, i) => {
        const h = document.createElement('h1');
        h.textContent = text;
        container.appendChild(h);
        if (i < list.length - 1) {
          const div = document.createElement('div');
          div.className = 'divider';
          div.textContent = '–';
          container.appendChild(div);
        }
      });
    }

    appendWithDividers(light, 'lightHalf');
    appendWithDividers(dark,  'darkHalf');
  }

  // ── FALLBACK (if sheet unreachable) ──────────────────────────────
  const FALLBACK_DO = [
    "Speak to yourself as you would to an 8-year-old who doesn't want to get in trouble.",
    "Write one kind sentence about yourself in your journal, even if you don't fully believe it.",
    "Send one short, genuine appreciation message to a friend.",
    "Notice one moment you feel jealousy and add: \"Of course I feel this; it makes sense.\"",
    "Practice \"responsibility to\" someone by keeping one small promise today."
  ];
  const FALLBACK_AVOID = [
    "Avoid using things to avoid or disconnect from your feelings today.",
    "Do not force yourself to figure it out once and for all; allow not-knowing.",
    "Refrain from assuming that wanting emotional intimacy makes you weak or childish.",
    "Avoid escalating a small fear into a full doom scenario.",
    "Do not treat your protectiveness of others as proof you must exile yourself.",
    "Refrain from labeling your needs as too much."
  ];

  // ── LOAD ──────────────────────────────────────────────────────────
  async function load() {
    try {
      const res  = await fetch(SHEET_CSV_URL);
      const text = await res.text();
      const rows = parseCSV(text).filter(r => r[0] && r[1]);

      const doList    = rows.filter(r => r[1].toLowerCase().trim() === 'do').map(r => r[0]);
      const avoidList = rows.filter(r => r[1].toLowerCase().trim() === 'avoid').map(r => r[0]);

      if (doList.length < COUNT || avoidList.length < COUNT) throw new Error('Too few rows');
      render(doList, avoidList);
    } catch (e) {
      console.warn('Using fallback statements.', e);
      render(FALLBACK_DO, FALLBACK_AVOID);
    }
  }

  load();
</script>
</body>
</html>
